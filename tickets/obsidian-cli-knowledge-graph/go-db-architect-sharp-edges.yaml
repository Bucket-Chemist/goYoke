# Sharp Edges for GO Database Architect Agent
# These are domain-specific pitfalls for embedded temporal knowledge graphs,
# SQLite graph modeling, bbolt caching, vector search, vault sync, and
# memory consolidation in pure Go.

version: "1.0"
updated: "2026-02-18"

sharp_edges:

  # ═══════════════════════════════════════════════
  # SQLite — Connection & Transaction
  # ═══════════════════════════════════════════════

  - id: sqlite-deferred-tx-upgrade
    severity: critical
    category: sqlite-transactions
    description: "Deferred transaction upgrading to write gets instant SQLITE_BUSY regardless of busy_timeout"
    symptom: "Sporadic 'database is locked' errors under normal load despite busy_timeout being set"
    solution: |
      SQLite's default BEGIN DEFERRED starts as a reader. When it first tries
      to write, it must upgrade to a writer lock. If another connection holds
      a read lock (even in WAL mode), the upgrade fails IMMEDIATELY — the
      busy_timeout handler is NOT invoked for deferred→write upgrades.

      WRONG — default deferred transactions for writes:
      db.Begin()  // BEGIN DEFERRED — upgrade race

      CORRECT — use immediate transactions via DSN:
      sql.Open("sqlite", "file:graph.db?_txlock=immediate")

      Or use BEGIN IMMEDIATE explicitly:
      db.BeginTx(ctx, &sql.TxOptions{})  // with _txlock=immediate in DSN

      The dual-pool pattern eliminates this entirely:
      writeDB with MaxOpenConns(1) and _txlock=immediate
      readDB  with MaxOpenConns(N) for concurrent reads
    auto_inject: true

  - id: sqlite-modernc-maxopenconns
    severity: critical
    category: sqlite-connections
    description: "modernc.org/sqlite REQUIRES SetMaxOpenConns(>0) for concurrency"
    symptom: "Deadlock or panic under concurrent access with modernc driver"
    solution: |
      modernc.org/sqlite's connection pooling does not work correctly with
      the default MaxOpenConns(0) (unlimited). Unlike mattn/go-sqlite3,
      the pure Go driver needs an explicit limit.

      WRONG — unlimited connections:
      db, _ := sql.Open("sqlite", "graph.db")
      // MaxOpenConns defaults to 0 — DEADLOCK under concurrency

      CORRECT — always set explicit limits:
      readDB.SetMaxOpenConns(max(4, runtime.GOMAXPROCS(0)))
      writeDB.SetMaxOpenConns(1)
    auto_inject: true

  - id: sqlite-unclosed-rows-wal-leak
    severity: critical
    category: sqlite-resources
    description: "Unclosed rows objects prevent WAL checkpointing, causing unbounded WAL growth"
    symptom: "WAL file grows to gigabytes over time; disk usage never reclaims"
    solution: |
      Every rows object holds a read transaction open. If not closed, the WAL
      checkpoint cannot advance past that transaction's snapshot, causing the
      WAL file to accumulate indefinitely.

      WRONG — forgetting to close rows:
      rows, _ := db.Query("SELECT ...")
      for rows.Next() { /* ... */ }
      // rows never closed — WAL checkpoint blocked forever

      WRONG — early return without close:
      rows, _ := db.Query("SELECT ...")
      defer rows.Close()
      for rows.Next() {
          if err := process(row); err != nil {
              return err  // rows.Close() runs via defer — OK
          }
      }
      // But forgetting defer is the real danger

      CORRECT — always defer close and check Err():
      rows, err := db.QueryContext(ctx, query, args...)
      if err != nil {
          return fmt.Errorf("query: %w", err)
      }
      defer rows.Close()

      var results []T
      for rows.Next() {
          // scan...
      }
      if err := rows.Err(); err != nil {
          return fmt.Errorf("iterate: %w", err)
      }

      For single-row results, use QueryRow() instead — it closes automatically:
      var count int
      err := db.QueryRowContext(ctx, "SELECT COUNT(*) FROM nodes").Scan(&count)
    auto_inject: true

  - id: sqlite-busy-timeout-pragma-order
    severity: high
    category: sqlite-configuration
    description: "PRAGMAs must be set BEFORE first query; busy_timeout via DSN not always respected"
    symptom: "SQLITE_BUSY errors despite busy_timeout being configured"
    solution: |
      Some SQLite drivers apply DSN pragmas inconsistently. The safest approach
      is to set critical PRAGMAs explicitly on each new connection via a
      ConnInitFunc or immediately after Open.

      CORRECT — belt-and-suspenders approach:
      db, _ := sql.Open("sqlite", "file:graph.db?_pragma=busy_timeout(10000)&_pragma=journal_mode(WAL)")

      // Also set via Exec for safety:
      db.Exec("PRAGMA busy_timeout = 10000")
      db.Exec("PRAGMA journal_mode = WAL")
      db.Exec("PRAGMA synchronous = NORMAL")

      The full recommended PRAGMA set:
      journal_mode = WAL
      synchronous = NORMAL
      busy_timeout = 10000
      cache_size = -32000       (32MB)
      temp_store = MEMORY
      foreign_keys = ON
      mmap_size = 268435456     (256MB)
    auto_inject: true

  - id: sqlite-vec-modernc-incompatible
    severity: high
    category: sqlite-extensions
    description: "sqlite-vec is INCOMPATIBLE with modernc.org/sqlite"
    symptom: "Build failures or runtime panics when trying to load sqlite-vec with modernc"
    solution: |
      The sqlite-vec README explicitly states: "this will NOT work with
      modernc.org/sqlite." sqlite-vec Go bindings only support ncruces/go-sqlite3
      (WASM-based) or mattn/go-sqlite3 (CGO-based).

      For a pure-Go no-CGO stack, keep vector search OUTSIDE SQLite:

      Option A (recommended <100K vectors): chromem-go
        Pure Go, in-memory with persistence, zero dependencies.
        100 docs in 90µs, 10K in ~5ms, 100K in ~40ms.

      Option B (>100K vectors): coder/hnsw
        Pure Go HNSW implementation, O(log n) search.

      Store embedding BLOBs in SQLite for persistence, but search via
      the Go-native index loaded at startup.
    auto_inject: true

  # ═══════════════════════════════════════════════
  # SQLite — Queries & Schema
  # ═══════════════════════════════════════════════

  - id: sqlite-recursive-cte-blowup
    severity: high
    category: sqlite-queries
    description: "Recursive CTEs explode on dense graphs without depth limits and cycle prevention"
    symptom: "Query hangs or OOMs on graphs with cycles or high fan-out"
    solution: |
      SQLite's default recursion limit is 1,000 rows. The path-tracking
      approach prevents cycles but does NOT prevent visiting the same node
      via different paths, causing exponential blowup.

      WRONG — no depth limit or cycle prevention:
      WITH RECURSIVE r AS (
          SELECT target_id FROM edges WHERE source_id = ?
          UNION ALL
          SELECT e.target_id FROM edges e JOIN r ON e.source_id = r.target_id
      )

      CORRECT — depth limit + cycle prevention + temporal filter:
      WITH RECURSIVE neighbors(node_id, depth, path) AS (
          SELECT ?, 0, CAST(? AS TEXT)
          UNION ALL
          SELECT e.target_id, n.depth + 1,
                 n.path || ',' || CAST(e.target_id AS TEXT)
          FROM edges e
          JOIN neighbors n ON e.source_id = n.node_id
          WHERE n.depth < 4                             -- Hard depth limit
            AND e.tx_to = '9999-12-31T23:59:59.999'    -- Current edges only
            AND instr(',' || n.path || ',',
                       ',' || CAST(e.target_id AS TEXT) || ',') = 0  -- Cycle prevention
      )
      SELECT DISTINCT node_id, MIN(depth) FROM neighbors GROUP BY node_id;

      For graphs > 10K edges: perform traversal in Go with gonum instead.
    auto_inject: true

  - id: sqlite-fts5-bm25-negative-scores
    severity: medium
    category: sqlite-search
    description: "FTS5 bm25() returns NEGATIVE scores where lower (more negative) = better match"
    symptom: "Sorting results ascending gives worst matches first; score comparisons inverted"
    solution: |
      WRONG — assuming higher score = better match:
      SELECT *, bm25(nodes_fts) as rank FROM nodes_fts
      WHERE nodes_fts MATCH ? ORDER BY rank DESC;  -- WORST matches first!

      CORRECT — ORDER BY rank ASC (most negative = best):
      SELECT *, bm25(nodes_fts, 10.0, 1.0) as rank FROM nodes_fts
      WHERE nodes_fts MATCH ? ORDER BY rank ASC LIMIT ?;

      Column weights in bm25() correspond to column order in CREATE VIRTUAL TABLE.
      bm25(10.0, 1.0) means: name weighted 10x, summary weighted 1x.
    auto_inject: true

  - id: sqlite-json-extract-null
    severity: medium
    category: sqlite-schema
    description: "json_extract returns SQL NULL for missing keys, not JSON null"
    symptom: "WHERE json_extract(properties, '$.key') = 'null' never matches"
    solution: |
      WRONG — comparing to string 'null':
      WHERE json_extract(properties, '$.missing_key') = 'null'

      CORRECT — use IS NULL for missing keys:
      WHERE json_extract(properties, '$.key') IS NULL

      For distinguishing JSON null from missing key:
      WHERE json_type(properties, '$.key') IS NULL     -- key missing entirely
      WHERE json_type(properties, '$.key') = 'null'    -- key present, value is null
    auto_inject: true

  - id: sqlite-strict-cast-required
    severity: medium
    category: sqlite-schema
    description: "STRICT tables require explicit CAST in recursive CTEs for TEXT concatenation"
    symptom: "Type mismatch errors in recursive CTE path tracking with STRICT tables"
    solution: |
      STRICT mode enforces column types. The initial SELECT in a recursive CTE
      defines the column types. If the seed uses an INTEGER for the path column,
      the recursive term's TEXT concatenation fails.

      WRONG — implicit type in seed:
      SELECT source_id, 0, source_id  -- path column typed as INTEGER
      UNION ALL
      SELECT ..., n.path || ',' || e.target_id  -- TEXT concat on INTEGER column

      CORRECT — explicit CAST in seed:
      SELECT source_id, 0, CAST(source_id AS TEXT)  -- path column typed as TEXT
      UNION ALL
      SELECT ..., n.path || ',' || CAST(e.target_id AS TEXT)
    auto_inject: true

  - id: sqlite-drop-column-rewrite
    severity: medium
    category: sqlite-migrations
    description: "ALTER TABLE DROP COLUMN rewrites the entire table in SQLite"
    symptom: "Migration takes unexpectedly long; database doubles in size during migration"
    solution: |
      SQLite does support DROP COLUMN (since 3.35.0) but it rewrites the
      entire table. For large tables (>100K rows), this is slow and
      temporarily doubles disk usage.

      PREFERRED — add columns, never drop:
      ALTER TABLE nodes ADD COLUMN new_field TEXT NOT NULL DEFAULT '';

      If drop is truly needed, use the 12-step procedure:
      1. Create new table with desired schema
      2. INSERT INTO new_table SELECT ... FROM old_table
      3. DROP TABLE old_table
      4. ALTER TABLE new_table RENAME TO old_table
      5. Recreate indexes and triggers
      All inside a single transaction.
    auto_inject: false

  # ═══════════════════════════════════════════════
  # bbolt — Cache Layer
  # ═══════════════════════════════════════════════

  - id: bbolt-byte-slice-lifetime
    severity: critical
    category: bbolt-transactions
    description: "Byte slices from bbolt Get() point to mmap'd memory — invalid after transaction closes"
    symptom: "unexpected fault address panics, data corruption, intermittent crashes"
    solution: |
      bbolt's Get() returns a slice pointing directly into memory-mapped file
      pages. The slice is only valid for the duration of the transaction.
      After the transaction closes, the memory may be remapped or freed.

      The Lightning Network's lnd project hit this exact bug (PR #6547).

      WRONG — using slice after transaction:
      var v []byte
      db.View(func(tx *bbolt.Tx) error {
          v = tx.Bucket(b).Get(key)  // v points to mmap'd page
          return nil
      })
      json.Unmarshal(v, &result)  // PANIC: v may be invalid

      CORRECT — copy within transaction:
      var data []byte
      db.View(func(tx *bbolt.Tx) error {
          v := tx.Bucket(b).Get(key)
          if v != nil {
              data = make([]byte, len(v))
              copy(data, v)  // Safe copy
          }
          return nil
      })
      if data != nil {
          json.Unmarshal(data, &result)  // Safe: data is our own allocation
      }
    auto_inject: true

  - id: bbolt-nested-transaction-deadlock
    severity: critical
    category: bbolt-transactions
    description: "Nesting View inside Update (or vice versa) from the same goroutine deadlocks"
    symptom: "Application hangs permanently with no error output"
    solution: |
      bbolt uses a single-writer mutex. If a goroutine holds a write
      transaction and attempts to open a read transaction (or vice versa),
      it deadlocks waiting for itself.

      WRONG — nested transactions:
      db.Update(func(tx *bbolt.Tx) error {
          db.View(func(tx2 *bbolt.Tx) error {  // DEADLOCK
              // ...
          })
      })

      CORRECT — gather data first, then write:
      // Phase 1: Read
      var data []byte
      db.View(func(tx *bbolt.Tx) error {
          v := tx.Bucket(b).Get(key)
          if v != nil { data = append([]byte{}, v...) }
          return nil
      })

      // Phase 2: Write (separate transaction)
      db.Update(func(tx *bbolt.Tx) error {
          return tx.Bucket(b).Put(newKey, transform(data))
      })
    auto_inject: true

  - id: bbolt-file-never-shrinks
    severity: high
    category: bbolt-operations
    description: "bbolt database files never shrink — deleted data leaves free pages"
    symptom: "Cache database grows to hundreds of MB despite containing little live data"
    solution: |
      bbolt reuses free pages for new writes but never returns space to the
      filesystem. Long-running processes with churn accumulate dead space.

      Mitigation: Periodic compaction by copying to new database.

      func compactBbolt(src, dst string) error {
          srcDB, _ := bbolt.Open(src, 0600, nil)
          defer srcDB.Close()
          dstDB, _ := bbolt.Open(dst, 0600, nil)
          defer dstDB.Close()

          return srcDB.View(func(srcTx *bbolt.Tx) error {
              return dstDB.Update(func(dstTx *bbolt.Tx) error {
                  return srcTx.ForEach(func(name []byte, b *bbolt.Bucket) error {
                      dstB, _ := dstTx.CreateBucketIfNotExists(name)
                      return b.ForEach(func(k, v []byte) error {
                          return dstB.Put(k, v)
                      })
                  })
              })
          })
      }

      Run compaction during sleep-time consolidation, not during active sessions.
    auto_inject: false

  - id: bbolt-long-read-tx-blocks-writer
    severity: high
    category: bbolt-transactions
    description: "Long-running read transactions block write transactions in bbolt"
    symptom: "Write latency spikes when background reads are active"
    solution: |
      bbolt uses MVCC but writers must wait for ALL active readers to
      finish before their transaction can complete. A slow View() blocks
      all Update() calls.

      WRONG — long computation inside View:
      db.View(func(tx *bbolt.Tx) error {
          data := tx.Bucket(b).Get(key)
          expensiveComputation(data)  // Blocks all writers
          return nil
      })

      CORRECT — copy data out, compute outside:
      var data []byte
      db.View(func(tx *bbolt.Tx) error {
          v := tx.Bucket(b).Get(key)
          data = append([]byte{}, v...)
          return nil  // Transaction closes immediately
      })
      expensiveComputation(data)  // Writers unblocked
    auto_inject: true

  # ═══════════════════════════════════════════════
  # Vector Search & Embeddings
  # ═══════════════════════════════════════════════

  - id: vector-dimension-mismatch
    severity: critical
    category: vector-search
    description: "Vectors from different embedding models exist in incompatible spaces"
    symptom: "Similarity search returns irrelevant results; cosine similarity near zero"
    solution: |
      Embeddings from different models (or even different versions of the
      same model) are NOT comparable. Mixing them corrupts all similarity
      results silently — no error, just garbage output.

      REQUIRED: Store model identifier with every embedding.

      CREATE TABLE embeddings (
          node_id     INTEGER NOT NULL,
          model       TEXT NOT NULL,       -- 'nomic-embed-text-v1.5'
          dimensions  INTEGER NOT NULL,    -- 768
          vector      BLOB NOT NULL,
          content_hash TEXT NOT NULL,      -- SHA-256 of source text
          UNIQUE(node_id, model)
      );

      On model change: re-embed ALL existing nodes (not just new ones).
      For <100K entities with Ollama + nomic-embed-text, this takes ~5 minutes.

      NEVER mix models in a single similarity query.
      ALWAYS filter by model column before computing distances.
    auto_inject: true

  - id: vector-prenormalize-for-cosine
    severity: medium
    category: vector-search
    description: "Pre-normalize embeddings at storage time to reduce cosine similarity to dot product"
    symptom: "Cosine similarity computation is unnecessarily slow"
    solution: |
      cosine_similarity(a, b) = dot(a, b) / (norm(a) * norm(b))

      If both vectors are L2-normalized (unit length), this simplifies to:
      cosine_similarity(a, b) = dot(a, b)

      Ollama embeddings are already L2-normalized by default.
      Verify and normalize at ingestion time:

      func normalizeL2(vec []float32) {
          var norm float64
          for _, v := range vec {
              norm += float64(v) * float64(v)
          }
          norm = math.Sqrt(norm)
          if norm > 0 {
              for i := range vec {
                  vec[i] = float32(float64(vec[i]) / norm)
              }
          }
      }

      For SIMD-accelerated dot product, use viterin/vek (~10x faster).
    auto_inject: false

  - id: embedding-content-hash-stale
    severity: medium
    category: vector-search
    description: "Node content can change without re-embedding, leaving stale vectors"
    symptom: "Search returns nodes whose content no longer matches the query"
    solution: |
      Store a SHA-256 hash of the source text alongside each embedding.
      On node update, compare hashes — re-embed only if content changed.

      func needsReembed(node *Node, existing *Embedding) bool {
          currentHash := sha256Hex(node.Name + "\n" + node.Summary)
          return existing == nil || existing.ContentHash != currentHash
      }

      Batch re-embedding during sleep-time consolidation, not inline.
    auto_inject: false

  # ═══════════════════════════════════════════════
  # Obsidian Vault & Markdown
  # ═══════════════════════════════════════════════

  - id: fsnotify-duplicate-events
    severity: high
    category: vault-sync
    description: "fsnotify fires 2-5 events per single file save; editors vary wildly"
    symptom: "Vault sync processes the same file multiple times per save"
    solution: |
      Vim: writes temp file → renames over original (RENAME + CREATE)
      VS Code: may do multiple WRITEs in sequence
      Obsidian: WRITE + CHMOD on every save
      macOS Spotlight: generates spurious CHMOD events on all files

      REQUIRED: Debounce with per-file timers at 100-200ms.

      type Debouncer struct {
          mu     sync.Mutex
          timers map[string]*time.Timer
          fn     func(path string)
      }

      func (d *Debouncer) Trigger(path string) {
          d.mu.Lock()
          defer d.mu.Unlock()
          if t, ok := d.timers[path]; ok {
              t.Stop()
          }
          d.timers[path] = time.AfterFunc(150*time.Millisecond, func() {
              d.fn(path)
              d.mu.Lock()
              delete(d.timers, path)
              d.mu.Unlock()
          })
      }

      ALSO: Always filter out CHMOD-only events (macOS Spotlight noise):
      if event.Op == fsnotify.Chmod {
          continue  // Ignore pure permission changes
      }
    auto_inject: true

  - id: fsnotify-no-recursive-watch
    severity: high
    category: vault-sync
    description: "fsnotify does NOT recursively watch subdirectories"
    symptom: "New files in subdirectories go undetected"
    solution: |
      fsnotify only watches explicitly added directories. New subdirectories
      created after the watcher starts are NOT automatically watched.

      REQUIRED: Walk directory tree at startup + watch for CREATE events
      on directories to add them dynamically.

      func watchRecursive(watcher *fsnotify.Watcher, root string) error {
          return filepath.WalkDir(root, func(path string, d fs.DirEntry, err error) error {
              if err != nil || !d.IsDir() {
                  return err
              }
              if strings.HasPrefix(d.Name(), ".") {
                  return filepath.SkipDir  // Skip hidden dirs (.gogent/)
              }
              return watcher.Add(path)
          })
      }

      In the event loop, when a CREATE event fires on a directory:
      if event.Op&fsnotify.Create != 0 {
          if info, err := os.Stat(event.Name); err == nil && info.IsDir() {
              watcher.Add(event.Name)
          }
      }
    auto_inject: true

  - id: vault-write-feedback-loop
    severity: high
    category: vault-sync
    description: "Agent writing to vault triggers fsnotify which triggers re-ingestion"
    symptom: "Infinite loop: write → detect → ingest → write → detect..."
    solution: |
      REQUIRED: Track pending writes and suppress echo events.

      type VaultSync struct {
          pendingWrites sync.Map  // path → time.Time
      }

      // Before writing:
      vs.pendingWrites.Store(path, time.Now())
      atomic.WriteFile(path, content)

      // In fsnotify handler:
      func (vs *VaultSync) handleEvent(path string) {
          if ts, ok := vs.pendingWrites.Load(path); ok {
              if time.Since(ts.(time.Time)) < 500*time.Millisecond {
                  vs.pendingWrites.Delete(path)
                  return  // Suppress echo from our own write
              }
          }
          // Process external change...
      }
    auto_inject: true

  - id: yaml-frontmatter-special-chars
    severity: medium
    category: vault-sync
    description: "YAML frontmatter breaks on unquoted colons, boolean-like strings, and special chars"
    symptom: "Frontmatter parsing fails or values silently become wrong types"
    solution: |
      YAML interprets these values as booleans, not strings:
      yes, no, true, false, on, off, y, n

      Colons in values create nested mappings:
      title: The Best: Ever    → parses as {title: {The Best: Ever}}

      WRONG — unquoted values:
      ---
      name: Project: Fortress
      active: yes
      tags: [true, null]
      ---

      CORRECT — always quote potentially dangerous values:
      ---
      name: "Project: Fortress"
      active: "yes"
      tags: ["true", "null"]
      ---

      Implementation: quote ALL string values in generated frontmatter
      unless they are purely alphanumeric with no special characters.

      func yamlSafe(s string) string {
          if yamlNeedsQuoting(s) {
              return `"` + strings.ReplaceAll(s, `"`, `\"`) + `"`
          }
          return s
      }
    auto_inject: true

  - id: vault-filename-sanitization
    severity: medium
    category: vault-sync
    description: "Entity names may contain characters illegal in filenames across platforms"
    symptom: "File creation fails on Windows; Obsidian can't open files with certain names"
    solution: |
      Windows forbids: / \ : * ? " < > |
      macOS forbids: / :
      Obsidian additionally dislikes: # ^ [] |

      func sanitizeFilename(name string) string {
          // Replace illegal chars with hyphen
          illegal := regexp.MustCompile(`[/\\:*?"<>|#\^\[\]]`)
          safe := illegal.ReplaceAllString(name, "-")
          // Collapse multiple hyphens
          safe = regexp.MustCompile(`-{2,}`).ReplaceAllString(safe, "-")
          // Trim leading/trailing hyphens and spaces
          safe = strings.Trim(safe, "- ")
          // Truncate to 200 chars (leave room for path + extension)
          if len(safe) > 200 {
              safe = safe[:200]
          }
          if safe == "" {
              safe = "unnamed"
          }
          return safe
      }
    auto_inject: true

  # ═══════════════════════════════════════════════
  # Memory Consolidation & Graph Algorithms
  # ═══════════════════════════════════════════════

  - id: entity-resolution-false-merges
    severity: high
    category: consolidation
    description: "Entity resolution can falsely merge distinct entities with similar names"
    symptom: "Two different 'John Smith' entities merged; data attributed to wrong person"
    solution: |
      String similarity alone is insufficient. "Go" (language) vs "Go" (game)
      have perfect string similarity but are entirely different entities.

      REQUIRED: Hybrid matching with type constraint.

      func shouldMerge(a, b *Entity) bool {
          if a.Type != b.Type {
              return false  // Never merge across types
          }
          strSim := edlib.JaroWinklerSimilarity(a.Name, b.Name)
          embSim := dotProduct(a.Embedding, b.Embedding)
          score := 0.4*strSim + 0.6*embSim
          return score >= 0.85  // Conservative threshold
      }

      For ambiguous cases (score 0.75-0.85): flag for human review
      rather than auto-merging. Store merge decisions in a separate table
      for audit trail.
    auto_inject: true

  - id: consolidation-llm-json-malformed
    severity: high
    category: consolidation
    description: "LLM entity extraction returns malformed JSON ~5-10% of the time"
    symptom: "Consolidation pipeline crashes on unparseable extraction output"
    solution: |
      WRONG — trusting LLM JSON output:
      var result ExtractionResult
      json.Unmarshal([]byte(llmOutput), &result)  // Panics on malformed JSON

      CORRECT — defensive parsing with fallback:
      func parseExtraction(raw string) (*ExtractionResult, error) {
          // Strip markdown code fences if present
          raw = strings.TrimPrefix(raw, "```json")
          raw = strings.TrimPrefix(raw, "```")
          raw = strings.TrimSuffix(raw, "```")
          raw = strings.TrimSpace(raw)

          var result ExtractionResult
          if err := json.Unmarshal([]byte(raw), &result); err != nil {
              // Try to extract JSON from surrounding text
              start := strings.Index(raw, "{")
              end := strings.LastIndex(raw, "}")
              if start >= 0 && end > start {
                  raw = raw[start : end+1]
                  if err := json.Unmarshal([]byte(raw), &result); err != nil {
                      return nil, fmt.Errorf("parse extraction: %w", err)
                  }
              }
          }

          // Validate all entity types and relation types against allowed enums
          for _, e := range result.Entities {
              if !validEntityType(e.Type) {
                  e.Type = "concept"  // Safe fallback
              }
          }
          return &result, nil
      }
    auto_inject: true

  - id: decay-score-zero-stability
    severity: medium
    category: consolidation
    description: "FSRS decay formula divides by stability — zero or negative values cause NaN/Inf"
    symptom: "NaN scores propagate through ranking, breaking all sort operations"
    solution: |
      R(t, S) = (1 + t/(9·S))^(-1)

      If S = 0: division by zero → +Inf → NaN after pow
      If S < 0: negative denominator → nonsensical scores

      ALWAYS guard stability:
      func decayScore(daysSince, stability float64) float64 {
          if stability <= 0 {
              stability = 1.0  // Default to 1-day half-life
          }
          score := math.Pow(1.0+daysSince/(9.0*stability), -1.0)
          if math.IsNaN(score) || math.IsInf(score, 0) {
              return 0.0  // Safe fallback
          }
          return score
      }
    auto_inject: true

  - id: label-propagation-not-in-gonum
    severity: low
    category: graph-algorithms
    description: "Label propagation is NOT in gonum — must be implemented manually"
    symptom: "Import error or fruitless search for label propagation in gonum/graph"
    solution: |
      gonum provides Louvain community detection (graph/community) but NOT
      label propagation. Label propagation is ~30 lines of custom Go:

      func labelPropagation(g graph.Graph, maxIter int) map[int64]int64 {
          labels := make(map[int64]int64)
          nodes := graph.NodesOf(g.Nodes())
          for _, n := range nodes {
              labels[n.ID()] = n.ID()  // Each node starts as own community
          }
          for iter := 0; iter < maxIter; iter++ {
              changed := false
              rand.Shuffle(len(nodes), func(i, j int) { nodes[i], nodes[j] = nodes[j], nodes[i] })
              for _, n := range nodes {
                  counts := make(map[int64]int)
                  neighbors := graph.NodesOf(g.From(n.ID()))
                  for _, nb := range neighbors {
                      counts[labels[nb.ID()]]++
                  }
                  if best := maxKey(counts); best != labels[n.ID()] {
                      labels[n.ID()] = best
                      changed = true
                  }
              }
              if !changed { break }
          }
          return labels
      }

      Use Louvain (gonum) for quality; label propagation for speed.
    auto_inject: false

