  - id: embedding-blob-not-json
    severity: medium
    category: storage-format
    description: "Storing embeddings as JSON arrays wastes 3-4x space vs raw float32 BLOBs"
    symptom: "Embeddings table grows to gigabytes; queries slow due to JSON parsing"
    solution: |
      768-dimensional float32 vector:
        As JSON array: ~6KB (decimal text with commas)
        As raw BLOB:   ~3KB (768 × 4 bytes)

      WRONG — JSON storage:
      INSERT INTO embeddings (vector) VALUES (json_array(0.123, -0.456, ...))

      CORRECT — binary BLOB storage:
      func encodeFloat32s(vec []float32) []byte {
          buf := make([]byte, len(vec)*4)
          for i, v := range vec {
              binary.LittleEndian.PutUint32(buf[i*4:], math.Float32bits(v))
          }
          return buf
      }

      func decodeFloat32s(data []byte) []float32 {
          vec := make([]float32, len(data)/4)
          for i := range vec {
              vec[i] = math.Float32frombits(binary.LittleEndian.Uint32(data[i*4:]))
          }
          return vec
      }
    auto_inject: false

  - id: timestamp-sentinel-consistency
    severity: medium
    category: storage-format
    description: "Bi-temporal sentinel value must be identical everywhere — string comparison breaks on deviation"
    symptom: "Temporal queries miss current edges due to whitespace or precision differences in sentinel"
    solution: |
      Define sentinel as a constant and use it everywhere:

      const (
          TemporalInfinity = "9999-12-31T23:59:59.999"
          TimeFormat       = "2006-01-02T15:04:05.000"  // Go reference time with ms
      )

      WRONG — inconsistent sentinels:
      tx_to = '9999-12-31T23:59:59'        -- Missing milliseconds
      tx_to = '9999-12-31T23:59:59.999Z'   -- Has Z suffix
      tx_to = '9999-12-31 23:59:59.999'    -- Space instead of T

      These are all different strings in SQLite. WHERE tx_to = ? will
      silently miss edges with variant sentinels.

      CORRECT — use the constant in all Go code and SQL:
      stmt.Exec(/* ... */, TemporalInfinity)
      WHERE tx_to = ?  -- Always bind TemporalInfinity
    auto_inject: true

  - id: linux-kernel-bbolt-corruption
    severity: low
    category: platform
    description: "Linux kernels 5.10–5.16 with ext4 fast_commit can corrupt bbolt databases"
    symptom: "Data loss or corruption after power failure on affected kernels"
    solution: |
      This was fixed in Linux 5.10.94+. Verify kernel version:
      uname -r

      If running an affected kernel:
      - Disable ext4 fast_commit: mount -o commit=5,nofast_commit
      - Or upgrade kernel

      For maximum safety on all platforms, set:
      db, _ := bbolt.Open(path, 0600, &bbolt.Options{
          NoFreelistSync: false,  // Default — sync freelist on commit
          FreelistType:   bbolt.FreelistMapType,  // More resilient
      })
    auto_inject: false
