version: 2

before:
  hooks:
    - go mod tidy
    - 'test -f defaults/agents/agents-index.json || (echo "defaults/ not populated" && exit 1)'

builds:
  - id: goyoke
    main: ./cmd/goyoke
    binary: goyoke
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: goyoke-mcp
