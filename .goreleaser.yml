archives:
  - id: default
    ids:
      - goyoke
      - goyoke-mcp
      - goyoke-team-run
      - goyoke-load-context
      - goyoke-validate
      - goyoke-agent-endstate
      - goyoke-aggregate
      - goyoke-archive
      - goyoke-capture-intent
      - goyoke-codebase-extract
      - goyoke-config-guard
      - goyoke-direct-impl-check
      - goyoke-instructions-audit
      - goyoke-log-review
      - goyoke-ml-export
      - goyoke-orchestrator-guard
      - goyoke-permission-gate
      - goyoke-plan-impl
      - goyoke-scout
      - goyoke-sharp-edge
      - goyoke-skill-guard
      - goyoke-team-prepare-synthesis
      - goyoke-update-review-outcome
      - goyoke-validate-schemas
      - goyoke-version
    name_template: "goYoke_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  name_template: "goYoke {{ .Version }}"
  header: |
    ## Installation

    **Go install** (requires Go 1.25+):
    ```bash
    go install github.com/{{ .Env.GITHUB_REPOSITORY }}/cmd/...@{{ .Tag }}
    ```

    **Standalone** (download and extract to a directory on your PATH):
    See assets below for your platform.

    **Prerequisites:** [Claude Code](https://docs.anthropic.com/en/docs/claude-code) installed and authenticated.
