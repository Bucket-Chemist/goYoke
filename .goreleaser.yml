version: 2

before:
  hooks:
    - go mod tidy
    - 'test -f defaults/agents/agents-index.json || (echo "defaults/ not populated" && exit 1)'

builds:
  - id: goyoke
    main: ./cmd/goyoke
    binary: goyoke
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -w -X main.version={{.Version}}
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: default
    ids: [goyoke]
    name_template: "goYoke_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    # Windows zip override — re-enable when Windows port complete (see tickets/windows-distro/)
    # format_overrides:
    #   - goos: windows
    #     formats:
    #       - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  name_template: "goYoke {{ .Version }}"
  header: |
    ## Installation

    **Go install** (requires Go 1.25+):
    ```bash
    go install github.com/{{ .Env.GITHUB_REPOSITORY }}/cmd/goyoke@{{ .Tag }}
    ```

    **Standalone** (single binary — download and add to PATH):
    See assets below for your platform.

    **Prerequisites:** [Claude Code](https://docs.anthropic.com/en/docs/claude-code) installed and authenticated.
