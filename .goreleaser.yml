version: 2

before:
  hooks:
    - go mod tidy
    - 'test -f defaults/agents/agents-index.json || (echo "defaults/ not populated" && exit 1)'

builds:
  - id: goyoke
    main: ./cmd/goyoke
    binary: goyoke
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -w -X main.version={{.Version}}
    ignore:
      - goos: linux
        goarch: arm64
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids: [goyoke]
    name_template: "goYoke_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: goyoke
    repository:
      owner: Bucket-Chemist
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Bucket-Chemist/goYoke"
    description: "Programmatic enforcement for Claude Code agentic workflows"
    license: "MIT"
    url_template: "https://github.com/Bucket-Chemist/goYoke/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    download_strategy: CurlDownloadStrategy
    install: |
      bin.install "goyoke"
    test: |
      system bin/"goyoke", "version"

aurs:
  - name: goyoke-bin
    homepage: "https://github.com/Bucket-Chemist/goYoke"
    description: "Programmatic enforcement for Claude Code agentic workflows"
    maintainers:
      - "Dokter Smol <will.klare.nl@gmail.com>"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/goyoke-bin.git"
    depends: []
    package: |
      install -Dm755 "./goyoke" "${pkgdir}/usr/bin/goyoke"

release:
  draft: false
  prerelease: auto
  name_template: "goYoke {{ .Version }}"
  header: |
    ## Installation

    **Homebrew** (macOS + Linux):
    ```bash
    brew install Bucket-Chemist/tap/goyoke
    ```

    **Arch Linux** (AUR):
    ```bash
    paru -S goyoke-bin
    ```

    **Go install** (requires Go 1.25+):
    ```bash
    go install github.com/Bucket-Chemist/goYoke/cmd/goyoke@{{ .Tag }}
    ```

    **Standalone** (single binary — download and add to PATH):
    See assets below for your platform.

    **Prerequisites:** [Claude Code](https://docs.anthropic.com/en/docs/claude-code) installed and authenticated.
