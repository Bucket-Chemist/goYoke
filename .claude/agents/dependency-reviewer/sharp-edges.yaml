version: "2.0"
updated: "2026-04-15"

sharp_edges:
  # --- CRITICAL: Build-Blocking ---

  - id: dep-compile-cycle
    severity: critical
    category: structure
    description: "Import cycle preventing compilation (Go) or causing undefined references (TS/Python)"
    symptom: "Go: build fails with 'import cycle not allowed'. Python/TS: intermittent ImportError or undefined at runtime depending on import order."
    solution: |
      Apply cycle-breaking diagnostics:
      1. Conceptual distinctness — same concept split? Merge.
      2. Coupling type — concrete types? Extract interface to third package.
      3. Primary direction — one edge weaker? Invert with callbacks/DI.
      4. Cycle length — 3+ packages? Escalate for architectural review.
      Always list the full cycle path in findings.
    detection: "go list -json ./... | jq '{ImportPath, Imports}' or npx madge --circular --json src/"
    auto_inject: true

  - id: dep-transitive-cycle
    severity: critical
    category: structure
    description: "Cycle spanning 3+ packages where distance obscures the circular dependency"
    symptom: "Each individual edge looks reasonable. Full transitive graph reveals A→B→C→D→A. Modules cannot be extracted or replaced independently."
    solution: |
      Build full transitive import graph, not just direct imports.
      Check for packages appearing as both ancestor and descendant.
      Apply cycle-breaking diagnostics starting at Q4 (cycle length).
      3+ package cycles often need architectural review.
    detection: "Build transitive closure of import graph; check for packages in both ancestor and descendant sets"
    auto_inject: true

  # --- HIGH: Structural Problems ---

  - id: dep-cycle-forced-duplication
    severity: high
    category: data-integrity
    description: "Cycle prevents type/code sharing, forcing duplication that diverges silently"
    symptom: "Identical struct/type definitions in packages within a cycle. Copies diverge as one is updated and the other isn't. Root cause of persistent dedup findings."
    solution: |
      Break the cycle first (see dep-compile-cycle diagnostics).
      Once the cycle is broken, consolidate duplicated types into the
      appropriate package. Tag with dep-forces-duplication for dedup-reviewer.
    detection: "Cross-reference identical type definitions across packages that form a dependency cycle"
    auto_inject: true

  - id: dep-layer-violation
    severity: high
    category: direction
    description: "Lower architectural layer importing from higher layer (model imports handler, repo imports service)"
    symptom: "UI/handler changes cascade into data layer. Architecture boundaries provide no isolation. Stability gradient is inverted."
    solution: |
      Map packages to architectural layers (handler → service → repo → model).
      Introduce an interface at the boundary: lower layer defines the
      interface it needs, higher layer provides the implementation.
    detection: "Map packages to layers; grep imports in lower-layer packages for upper-layer references"
    auto_inject: true

  - id: dep-god-module-concrete
    severity: high
    category: convergence
    description: "Module with high fan-in AND concrete types (no interfaces), attracting unrelated responsibilities"
    symptom: "Every change to this module risks breaking many dependents. Module grows unbounded because it's the path of least resistance. No interface to program against."
    solution: |
      Distinguish from healthy shared-types packages (abstract, stable).
      God module = concrete + high fan-in + mixed responsibilities.
      Split by responsibility. Extract interfaces for consumers.
      Measure fan-in as ratio to total module count, not absolute number.
    detection: "Fan-in ratio >50% of project modules; check for absence of exported interfaces"
    auto_inject: true

  - id: dep-stability-inversion
    severity: high
    category: direction
    description: "Stable module (many dependents) importing unstable module (many dependencies)"
    symptom: "Frequent changes in the unstable module cascade through the stable module to all its dependents. Change amplification."
    solution: |
      Invert the dependency: stable module defines an interface,
      unstable module implements it. Or extract the shared concern
      into a separate stable package.
    detection: "Compare fan-in/fan-out ratios across dependency edges; high fan-in importing high fan-out"
    auto_inject: true

  # --- MEDIUM: Coupling Concerns ---

  - id: dep-missing-interface
    severity: medium
    category: coupling
    description: "Concrete types flowing between architectural layers without an interface boundary"
    symptom: "Tests for consuming layer must import producing layer's concrete implementation. Mock injection impossible. Test isolation lost."
    solution: |
      Define interface in the consuming layer's package.
      Producing layer implements the interface.
      Tests can use mock implementations without importing production code.
    detection: "Check if mocking/testing requires importing the implementation package"
    auto_inject: true

  - id: dep-fan-out-explosion
    severity: medium
    category: convergence
    description: "Non-entry-point module with 15+ imports"
    symptom: "Module knows too much. Can't be understood or tested in isolation. Any dependency change may affect it."
    solution: |
      Check if module is an entry point / Composition Root first (not a problem).
      For non-entry-points: split by responsibility or introduce
      facade/mediator to reduce direct import count.
    detection: "Count imports per file; exclude main.go, app.ts, __main__.py"
    auto_inject: true

  - id: dep-bidirectional-coupling
    severity: medium
    category: coupling
    description: "Two modules with mutual concrete dependencies"
    symptom: "Change to one always requires change to the other. Effectively one module split across two packages."
    solution: |
      Extract shared concern into a third module, or
      define an interface so one direction is abstract.
      If conceptually the same thing, consider merging.
    detection: "Pairs where A imports B AND B imports A through concrete types"
    auto_inject: true

  - id: dep-test-impl-coupling
    severity: medium
    category: coupling
    description: "Test code depending on implementation internals rather than public API"
    symptom: "Internal refactoring breaks tests even when behavior is unchanged. Tests are brittle and don't verify the contract."
    solution: |
      Test through the public API only. If testing requires internal access,
      the module's public API may need expansion, or the test is
      testing implementation details rather than behavior.
    detection: "Test imports of internal/ paths from outside parent, or imports bypassing barrel exports"
    auto_inject: true

  # --- LOW: False Positive Patterns ---

  - id: dep-false-positive-type-import
    severity: low
    category: judgment
    description: "Type-only import (TS import type, Python TYPE_CHECKING) flagged as runtime coupling"
    symptom: "False alarm — type-only imports create no runtime dependency edge"
    solution: |
      Verify the import is guarded: TS 'import type', Python 'if TYPE_CHECKING:'.
      If guarded, not a real dependency. Still note if type organization is suboptimal.
    detection: "Check for import type keyword or TYPE_CHECKING guard around import"
    auto_inject: true

  - id: dep-false-positive-entry-point
    severity: low
    category: judgment
    description: "Composition Root / entry point flagged as god module due to high fan-out"
    symptom: "False alarm — entry points wire the application by design"
    solution: |
      Verify the file is an entry point (main.go, app.ts, __main__.py, cmd/*.go).
      High fan-out in entry points is the Composition Root pattern, not a problem.
    detection: "Check file name/path against entry point patterns"
    auto_inject: true

  - id: dep-false-positive-generated
    severity: low
    category: judgment
    description: "Generated code imports (protobuf, gRPC, wire) flagged as coupling"
    symptom: "False alarm — coupling is managed by the code generator, not by developers"
    solution: |
      Check for generation markers: '// Code generated', '@generated'.
      Generated imports are managed by tooling. Flag only if consumers
      import generated code directly without a wrapper.
    detection: "Check for // Code generated, @generated markers in imported files"
    auto_inject: true

  - id: dep-false-positive-build-gated
    severity: low
    category: judgment
    description: "Build-tag or feature-gated imports flagged as runtime coupling"
    symptom: "False alarm — import only activates under specific build conditions"
    solution: |
      Check for Go build tags (//go:build), Rust feature gates (#[cfg(feature)]),
      or conditional Python imports. These are not default-build dependencies.
    detection: "Check for //go:build, #[cfg(feature = ...)], conditional import guards"
    auto_inject: true
