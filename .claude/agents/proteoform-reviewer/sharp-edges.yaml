edges:
  - id: proteoform-deconv-charge-cascade
    severity: critical
    description: Charge state assignment error producing phantom proteoforms at harmonic or charge-shifted masses
    detection: "Grep for masses at exact 1/2, 1/3, 2/3 ratios of abundant species; check charge range bounds vs sample mass"
    mitigation: "Verify charge state range appropriate for mass range; enable harmonic filtering; compare with independent deconvolution tool"

  - id: proteoform-deconv-harmonic-artifact
    severity: critical
    description: Harmonic artifacts from dominant species — phantom proteoforms at mass/N ratios
    detection: "Check deconvolved mass list for integer-ratio relationships; verify harmonic filtering enabled"
    mitigation: "Enable FLASHDeconv harmonic reduction or TopFD harmonic mass filtering; flag masses at exact fractions of abundant species"

  - id: proteoform-deconv-em-local-optima
    severity: critical
    description: EM-based deconvolution merges overlapping proteoforms into chimeric mass at local optimum
    detection: "UniDec: check convergence criteria; look for masses between expected PTM variants"
    mitigation: "Tighten convergence criteria; increase max iterations; compare with non-EM tool (TopFD/FLASHDeconv)"

  - id: proteoform-deconv-regularization
    severity: critical
    description: UniDec stiffness parameter miscalibrated — controls FP/FN tradeoff for proteoform detection
    detection: "Grep stiffness in UniDec config; very low values (<0.5) or very high values (>10) warrant investigation"
    mitigation: "Calibrate stiffness against known standard mixture; validate proteoform count against expected diversity"

  - id: proteoform-deconv-psf-mismatch
    severity: critical
    description: UniDec mzsig (point spread function) doesn't match instrument peak width — systematic mass errors
    detection: "Grep mzsig in UniDec config; compare to expected peak FWHM for instrument type and resolution"
    mitigation: "Measure actual peak FWHM from calibrant spectrum; set mzsig to match"

  - id: proteoform-deconv-resolution-mismatch
    severity: warning
    description: Deconvolution resolution parameter doesn't match instrument capability
    detection: "Xtract: check resolution at 400 m/z setting vs instrument spec sheet"
    mitigation: "Match resolution parameter to actual instrument specification"

  - id: proteoform-deconv-intensity-bias
    severity: warning
    description: EM intensity estimation biased toward abundant species in overlapping envelopes
    detection: "Check for overlapping charge state envelopes in mass list; compare relative intensities across algorithms"
    mitigation: "Report intensity uncertainty; compare abundance ratios with independent quantification method"

  - id: proteoform-ptm-no-fragment-evidence
    severity: critical
    description: PTM localization claimed without sufficient flanking fragment ion coverage
    detection: "Check fragment map for gaps around claimed PTM sites; verify localization scores >= 0.75"
    mitigation: "Require flanking fragments on both sides of claimed modification; report localization probability"

  - id: proteoform-ptm-combinatorial-explosion
    severity: critical
    description: Unbounded PTM combinatorial search — FDR unreliable in astronomical search space
    detection: "Grep for variable modification count; check max simultaneous modifications parameter"
    mitigation: "Bound combinatorial search to <= 3-4 simultaneous variable modifications"

  - id: proteoform-mass-adduct-as-ptm
    severity: critical
    description: Metal adducts (Na+/K+) misclassified as post-translational modifications
    detection: "Grep for adduct, sodium, desalt; check mass shifts of +22/+38/+44 Da classified as PTMs"
    mitigation: "Add explicit adduct modeling step before PTM assignment; verify desolvation quality"

  - id: proteoform-mass-truncation-as-diversity
    severity: warning
    description: In vitro degradation products reported as biological proteoform diversity
    detection: "Check for systematic N/C-terminal truncation patterns; high proteoform count from single gene"
    mitigation: "Flag truncation products separately from intact proteoforms; assess sample preparation quality"

  - id: proteoform-assign-fdr-wrong-level
    severity: critical
    description: Bottom-up PSM-level FDR applied to proteoform-spectrum matches — incompatible scoring framework
    detection: "Check FDR source: bottom-up PSM threshold vs top-down PrSM estimation"
    mitigation: "Apply PrSM-level FDR independently using ProSight E-values or TopPIC PrSM scores"

  - id: proteoform-assign-small-db-fdr
    severity: warning
    description: Target-decoy FDR unreliable on small (<500 proteoform) databases — FDR estimate statistically unstable
    detection: "Count proteoform entries in search database; check if entrapment or alternative FDR used"
    mitigation: "Use entrapment database or E-value thresholds for small search spaces"

  - id: proteoform-assign-mass-coincidence
    severity: warning
    description: PTM identity assigned based on mass shift alone when multiple modifications produce same delta mass
    detection: "Check +42, +80, +16, +28 Da assignments for orthogonal evidence"
    mitigation: "Require orthogonal evidence (fragmentation, chemical treatment) before assigning specific PTM identity"

  - id: proteoform-coverage-internal-fragments
    severity: warning
    description: Internal fragments misassigned as terminal ions — inflates coverage and creates false localization evidence
    detection: "Check fragment assignment logic for internal fragment handling; compare coverage with/without internal fragments"
    mitigation: "Separate internal fragment assignment with validation; report coverage excluding internal fragments"
