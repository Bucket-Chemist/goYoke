# Sharp edges for Proteogenomics Reviewer
# 38 IDs from the expanded agent body's Sharp Edge Correlation table.

edges:
  - id: proteogenomics-protein-strand-unaware
    severity: critical
    description: >
      Minus-strand gene mutation applied on plus strand. Produces the completely
      wrong amino acid — not a subtle error. The resulting protein passes all
      format checks. One wrong protein cascades to 30-80 wrong tryptic peptides.
    detection: >
      Check protein sequence generator for gene strand lookup before applying
      variant. Look for strand/STRAND field usage in sequence builder.
    mitigation: >
      Verify strand-aware mutation application. Reverse-complement both REF and
      ALT alleles for minus-strand genes before applying to cDNA.

  - id: proteogenomics-protein-ref-validation
    severity: critical
    description: >
      VCF REF allele not validated against reference genomic sequence at the
      variant position. REF mismatch silently accepted means variant applied
      at wrong context — every downstream amino acid wrong from mutation site.
    detection: >
      Check for assertion or comparison of VCF REF field vs fetched genomic
      sequence at position in the sequence builder.
    mitigation: >
      Assert REF allele matches reference before applying variant.

  - id: proteogenomics-protein-frameshift
    severity: critical
    description: >
      Frameshift not detected — run-on translation past original stop codon
      produces chimeric protein: correct prefix + nonsense suffix. Inflates
      DB with non-existent sequence.
    detection: >
      Check for indel length mod 3 check and truncation logic or NMD
      annotation parsing.
    mitigation: >
      Detect frameshifts (indel length not divisible by 3). Translate to next
      stop codon. Apply NMD prediction for truncation.

  - id: proteogenomics-protein-marking-lost
    severity: critical
    description: >
      Variant position marking (lowercase residues, brackets, metadata) stripped
      by str.upper() or normalization step. Cannot distinguish variant from
      reference peptides after digestion — novel peptide detection fails entirely.
    detection: >
      Check for case-preserving handling through translation and output. Look
      for str.upper() calls between variant marking and FASTA output.
    mitigation: >
      Preserve case marking through entire pipeline including digestion.

  - id: proteogenomics-protein-phase-ignored
    severity: critical
    description: >
      Compound heterozygous variants applied without phase information. Unphased
      variants (/ in GT field) applied to same haplotype arbitrarily — produces
      protein existing in neither haplotype (50% wrong for each).
    detection: >
      Check for phase information (| vs / in GT field) usage when multiple
      variants affect same protein.
    mitigation: >
      Use phasing. If unphased, generate all combinatorial haplotypes or flag
      the ambiguity.

  - id: proteogenomics-protein-selenocysteine
    severity: critical
    description: >
      Selenoprotein truncated at UGA codon by Seq.translate(to_stop=True).
      ~25 human selenoprotein genes (GPX1, TXNRD1, SELENOP, DIO1-3) use UGA
      as selenocysteine via SECIS element. All peptides C-terminal to Sec
      position lost from DB.
    detection: >
      Check for selenoprotein gene list or SECIS-aware translation. Look for
      to_stop=True without gene-level exception.
    mitigation: >
      Maintain selenoprotein gene list. Exempt UGA at known Sec positions
      from stop codon handling.

  - id: proteogenomics-protein-met-cleavage
    severity: warning
    description: >
      N-terminal Met cleavage forms not generated. ~60% of human proteins have
      initiator Met cleaved by MAP when second residue is small (A/C/G/P/S/T/V).
      Missing cleaved form means N-terminal peptide unmatchable in MS data.
    detection: >
      Check if both with-Met and without-Met forms generated when second
      residue meets MAP cleavage rule.
    mitigation: >
      Generate both forms for proteins where second residue is A/C/G/P/S/T/V.

  - id: proteogenomics-protein-mt-codon-table
    severity: critical
    description: >
      Mitochondrial variants translated with standard genetic code instead of
      vertebrate mitochondrial (NCBI table 2). UGA=Trp (not Stop),
      AGA/AGG=Stop (not Arg), AUA=Met (not Ile). All 13 mt-encoded proteins
      get wrong sequence.
    detection: >
      Check for chromosome (chrM/MT) triggering codon table=2 in translation.
      Biopython: Seq.translate(table=2, to_stop=True).
    mitigation: >
      Use table=2 for chrM/MT sequences.

  - id: proteogenomics-protein-nmd-included
    severity: warning
    description: >
      NMD-susceptible truncated proteins included in DB. PTC >50-55nt upstream
      of last exon-exon junction triggers NMD — mRNA degraded before translation.
      Phantom proteins inflate search space with proteins that never exist in vivo.
    detection: >
      Check for NMD flag from VEP --everything. PTC position relative to last
      exon-exon junction.
    mitigation: >
      Distinguish NMD-susceptible (exclude) from NMD-escaping (include) PTCs.

  - id: proteogenomics-protein-stoploss-unlimited
    severity: warning
    description: >
      Stop-loss variant translation continues indefinitely into 3'UTR without
      extension cap. Produces absurdly long proteins from low-complexity 3'UTR
      tails. DB size inflated.
    detection: >
      Check for maximum extension length (e.g., 100 codons) when stop codon
      destroyed by variant.
    mitigation: >
      Cap 3'UTR extension at 100 codons or next in-frame stop.

  - id: proteogenomics-protein-startloss-policy
    severity: warning
    description: >
      No explicit handling policy for start_lost consequence. Inconsistent
      behavior — sometimes skipped, sometimes translated from wrong downstream
      ATG.
    detection: >
      Check for explicit behavior when Consequence contains start_lost.
    mitigation: >
      Document explicit policy: skip, translate from next ATG, or both.

  - id: proteogenomics-protein-mnv-split
    severity: critical
    description: >
      Adjacent SNVs in same codon treated as separate single-substitutions
      instead of merged MNV. Produces two wrong proteins; correct double-
      substitution protein absent. Example: AAA(Lys)→GGA(Gly) via two SNVs
      produces AAA→GAA(Glu) + AAA→AGA(Arg) — neither correct.
    detection: >
      Check for adjacent/phased SNV merging within same codon before translation.
    mitigation: >
      Merge cis (same haplotype) variants within 3bp before translation. If
      unphased, generate combinatorial.

  - id: proteogenomics-transcript-refseq-map
    severity: warning
    description: >
      RefSeq-to-Ensembl transcript mapping drops unmapped IDs silently.
      Variants on unmapped transcripts produce no protein — gap in DB coverage.
    detection: >
      Check for NM_ to ENST conversion logic and handling of unmapped IDs.
    mitigation: >
      Log unmapped transcripts. Provide position-based fallback.

  - id: proteogenomics-transcript-mane-missing
    severity: warning
    description: >
      MANE_SELECT transcript not prioritized. Default picks longest transcript
      which may not be clinically relevant. Pathogenic splice variant annotated
      on non-MANE transcript produces wrong protein isoform.
    detection: >
      Check for MANE_SELECT or MANE_PLUS_CLINICAL field usage in VEP output
      parsing.
    mitigation: >
      Prioritize MANE_SELECT for clinical proteogenomics.

  - id: proteogenomics-transcript-version-strip
    severity: critical
    description: >
      Inconsistent transcript version suffix handling. ENST00000123456.7 vs
      ENST00000123456 — stripping in lookup but not in VEP output (or vice versa)
      causes 100% miss rate on that transcript's variants.
    detection: >
      Check version suffix handling in both VEP output parsing and PyEnsembl
      lookup. Must be consistent in both directions.
    mitigation: >
      Standardize version handling across all transcript ID operations.

  - id: proteogenomics-transcript-no-fallback
    severity: warning
    description: >
      No position-based fallback for unmapped transcript IDs. Hard failure on
      unmapped IDs drops variants entirely with no warning.
    detection: >
      Check for fallback logic when ID mapping fails — coordinate-based
      protein retrieval.
    mitigation: >
      Implement position-based fallback with logging.

  - id: proteogenomics-version-vep-pyensembl
    severity: critical
    description: >
      VEP cache version mismatched with PyEnsembl release. Release 110 VEP
      annotating against release 108 PyEnsembl models — transcript IDs resolve
      to different exon structures. Proteins built from wrong gene models.
    detection: >
      Check --cache_version and --dir_cache path vs pyensembl.EnsemblRelease()
      argument.
    mitigation: >
      Version-match VEP cache to PyEnsembl release. Use detect_vep_version()
      infrastructure.

  - id: proteogenomics-version-stale-cache
    severity: warning
    description: >
      Stale VEP cache used after pipeline or Ensembl upgrade. New variants
      annotated against obsolete gene models — recently characterized
      transcripts missing.
    detection: >
      Check cache directory timestamp or version file. Cache refresh logic.
    mitigation: >
      Validate cache version at pipeline startup.

  - id: proteogenomics-version-build-mismatch
    severity: critical
    description: >
      Genome build inconsistent across VCF-VEP-PyEnsembl stages. hg38 VCF
      coordinates annotated with GRCh37 cache — all transcript assignments
      wrong. Coordinates valid but genes misassigned.
    detection: >
      Check GRCh38/GRCh37/hg38/hg19 consistent across all proteogenomics stages.
    mitigation: >
      Enforce single build across VCF→VEP→PyEnsembl→FASTA.

  - id: proteogenomics-vcf-chr-prefix
    severity: critical
    description: >
      Chromosome prefix mismatch (chr1 vs 1) between VCF and VEP. VEP
      annotation returns empty for mismatched contig names — entire chromosomes
      missing from DB.
    detection: >
      Check chr1 vs 1 handling in VCF parser and VEP input preparation.
    mitigation: >
      Normalize chromosome prefixes at pipeline entry.

  - id: proteogenomics-vcf-multiallelic
    severity: critical
    description: >
      Multi-allelic sites not decomposed before annotation. ALT allele 2
      inherits allele 1's consequence annotation — wrong amino acid substitution.
    detection: >
      Check for bcftools norm -m - or per-allele iteration in VCF parser.
    mitigation: >
      Decompose multi-allelic sites before protein generation.

  - id: proteogenomics-vcf-indel-normalization
    severity: warning
    description: >
      Indels not left-aligned. Same indel represented differently across
      samples produces duplicate protein entries inflating DB.
    detection: >
      Check for bcftools norm or manual normalization before protein generation.
    mitigation: >
      Left-align indels before protein generation.

  - id: proteogenomics-vcf-filter-ignored
    severity: warning
    description: >
      Failed-filter variants included in database construction. Low-quality
      variants produce proteins that don't exist — inflates false discovery rate.
    detection: >
      Check FILTER column and FT format field parsing. Failed-filter exclusion.
    mitigation: >
      Exclude failed-filter variants from DB construction.

  - id: proteogenomics-vep-transcript-source
    severity: warning
    description: >
      VEP transcript source (--refseq, --merged, or default Ensembl) mismatched
      with downstream protein lookup. ENST IDs fed to RefSeq-based lookup fail
      silently.
    detection: >
      Check --refseq or --merged flag in VEP vs downstream transcript lookup system.
    mitigation: >
      Match VEP transcript source to downstream lookup system.

  - id: proteogenomics-vep-pick-coverage
    severity: warning
    description: >
      --pick strategy discards alternative transcript effects. Alternative
      transcripts with different protein effects missed — single protein per
      variant when multiple isoforms affected.
    detection: >
      Check --pick vs --per_gene vs all transcripts in VEP config.
    mitigation: >
      Assess --pick impact on coverage. Document choice rationale.

  - id: proteogenomics-vep-consequence-filter
    severity: warning
    description: >
      No consequence type filtering before protein generation. Synonymous
      variants generate identical-to-reference proteins — pure DB inflation
      with zero information gain.
    detection: >
      Check which Consequence values trigger protein generation. Synonymous
      should be excluded.
    mitigation: >
      Filter to protein-altering consequences only.

  - id: proteogenomics-fasta-header-incomplete
    severity: warning
    description: >
      FASTA headers lack variant traceability metadata (chromosome, position,
      REF/ALT, gene, transcript). Cannot trace identified peptides back to
      genomic variants.
    detection: >
      Check FASTA header parsing for completeness of variant metadata fields.
    mitigation: >
      Include full variant coordinates and gene annotation in headers.

  - id: proteogenomics-fasta-no-dedup
    severity: warning
    description: >
      Identical protein sequences from different variants not deduplicated.
      Search space inflated by redundant entries — FDR penalized without
      information gain.
    detection: >
      Check for hash-based or sequence comparison deduplication before DB assembly.
    mitigation: >
      Deduplicate identical sequences. Merge metadata from duplicate entries.

  - id: proteogenomics-fasta-no-proteotypic
    severity: warning
    description: >
      Variant proteins without unique detectable tryptic peptides (7-25 aa)
      included. Pure FDR cost — these proteins can never be distinguished
      from reference by MS.
    detection: >
      Check for uniqueness assessment of variant proteins — at least 1 unique
      tryptic peptide of MS-detectable length.
    mitigation: >
      Filter variant proteins without proteotypic peptides.

  - id: proteogenomics-db-search-inflation
    severity: warning
    description: >
      Search space inflation from custom DB not quantified. Custom DB may be
      5-50x larger than reference. Standard 1% FDR at Nx inflation means
      actual ~N% false discovery for variant class.
    detection: >
      Check for DB size comparison vs reference proteome. Ratio computed or logged.
    mitigation: >
      Quantify and log search space inflation ratio.

  - id: proteogenomics-db-reference-gap
    severity: critical
    description: >
      Canonical reference proteins missing from custom DB. Only variant proteins
      present — peptides from unaffected proteins have no match. Reported as
      absent when they exist in sample.
    detection: >
      Check for canonical UniProt/SwissProt appended to custom DB.
    mitigation: >
      Append full reference proteome to custom variant DB.

  - id: proteogenomics-db-class-fdr
    severity: warning
    description: >
      No class-specific FDR for novel vs known peptides. Single global 1% FDR
      on inflated DB yields ~5-15% actual FDR for novel peptide class
      (Nesvizhskii 2014 framework).
    detection: >
      Check for separate target-decoy or entrapment strategy for novel vs
      known peptide classes.
    mitigation: >
      Apply class-specific FDR or use entrapment database for novel class.

  - id: proteogenomics-het-missing-allele
    severity: critical
    description: >
      Only ALT protein for heterozygous variants. 50% of proteome at het
      loci missing — REF allele peptides unidentifiable in MS data.
    detection: >
      Check GT field parsing — 0/1 genotype should produce both REF and
      ALT protein.
    mitigation: >
      Generate both REF and ALT proteins for heterozygous sites.

  - id: proteogenomics-digest-case-lost
    severity: critical
    description: >
      Case-preserving variant marking destroyed during in silico digestion.
      str.upper() call before or during digestion strips lowercase variant
      markers — all peptides appear as reference sequence.
    detection: >
      Check for case preservation through digestion module. Look for upper()
      calls between FASTA input and peptide output.
    mitigation: >
      Preserve case through digestion. Digest operates on original case.

  - id: proteogenomics-digest-cleavage-site
    severity: critical
    description: >
      Variant creates or destroys trypsin cleavage site (K/R substitution)
      but pipeline patches residue in pre-digested peptides instead of
      re-digesting full variant protein. Wrong peptide boundaries.
    detection: >
      Check order of operations: translate→digest (correct) vs digest→substitute
      (wrong for K/R variants).
    mitigation: >
      Always digest full variant protein, not patch pre-digested reference.

  - id: proteogenomics-digest-isobaric
    severity: warning
    description: >
      Isobaric or near-isobaric variant ambiguity not annotated. I/L variants
      fundamentally undetectable by standard MS (both 113.084 Da). D→N changes
      confounded with deamidation artifact.
    detection: >
      Check for I↔L and D→N annotation in FASTA headers or digest output.
    mitigation: >
      Flag I↔L as MS-unresolvable. Flag D→N as potentially confounded with
      deamidation.

  - id: proteogenomics-popgen-af-ploidy
    severity: warning
    description: >
      AF calculation not ploidy-aware for sex chromosomes. Autosomal formula
      AF = ALT/(2N) applied to chrX in males gives wrong frequency.
    detection: >
      Check calculate_allele_frequencies() for chromosome-aware logic.
      chrX non-PAR in males = 1 copy, not 2.
    mitigation: >
      Adjust AF denominator for hemizygous loci.

  - id: proteogenomics-popgen-missing-gt
    severity: warning
    description: >
      Missing genotypes (./.) mishandled in AF denominator. If total_samples
      counts ungenotyped individuals, AF is systematically deflated across
      all variants with genotyping gaps.
    detection: >
      Check if total_samples counts only genotyped individuals or all samples.
    mitigation: >
      Exclude ungenotyped samples from denominator.

  - id: proteogenomics-popgen-no-af-floor
    severity: warning
    description: >
      No AF-based DB inclusion threshold for ultra-rare variants. Singletons
      (AF < 1/2N) have highest false-positive rate from sequencing artifacts.
      Each unnecessary entry degrades FDR.
    detection: >
      Check for minimum AF or expected-carrier-count floor before population
      FASTA inclusion.
    mitigation: >
      Consider requiring AF >= 2/2N (at least 2 observations) or stricter
      QUAL for singletons.

  - id: proteogenomics-novel-single-psm
    severity: warning
    description: >
      Novel peptides accepted with single PSM at same threshold as known
      peptides. In a 5x inflated DB, a single novel PSM has 5x higher
      probability of being false positive. Requiring >=2 PSMs reduces
      false positives quadratically.
    detection: >
      Check if pipeline applies or documents minimum PSM count for novel
      peptides.
    mitigation: >
      Require >=2 PSMs for novel peptide reporting or apply higher score
      threshold.

  - id: proteogenomics-novel-no-orthogonal
    severity: warning
    description: >
      Novel peptides reported without genomic back-confirmation. Without
      at least genomic + proteomic concordance, a novel peptide may be a
      mass shift from chemical modification coincidentally matching a
      variant sequence.
    detection: >
      Check if pipeline links identified variant peptides back to source
      VCF variant and optionally to RNA-seq expression evidence.
    mitigation: >
      Require genomic evidence (variant present in patient VCF) for novel
      peptide reporting.
