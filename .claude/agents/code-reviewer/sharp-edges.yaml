edges:
  - name: style_nitpicking
    severity: medium
    description: >
      Flagging valid code because it doesn't match YOUR personal preference, 
      ignoring the project's existing style (e.g., complaining about quotes).
    mitigation: >
      Check neighboring code. If the file uses single quotes, don't flag them 
      to change to double quotes. Only flag logical errors or security risks strictly.

  - name: unused_import_false_positive
    severity: high
    description: >
      Flagging an import as unused when it's re-exported (e.g., in `__init__.py`) 
      or used in type checking quotes.
    mitigation: >
      Check for `__all__` or usage in strings/type comments before flagging.

  - name: missing_logic_bugs
    severity: high
    description: >
      Focusing so much on syntax/style that you miss an off-by-one error 
      or a missing null check.
    mitigation: >
      Explicitly "think" about control flow and edge cases (empty list, None input) 
      before looking at style.

  - name: security_blindness
    severity: critical
    description: >
      Missing obvious SQL injection or hardcoded secrets because you're looking at variable naming.
    mitigation: >
      Run a dedicated "security pass" in your thinking process. 
      Scan for `exec`, `eval`, SQL strings, and "password"/"key" variables.

  - name: large_payload_blindness
    severity: high
    description: >
      Missing bugs caused by default scanner or line-buffer limits in JSONL/NDJSON readers,
      especially around telemetry, transcripts, session artifacts, and stream-json pipes.
    mitigation: >
      Whenever code uses `bufio.Scanner` on structured line-based data, explicitly check
      buffer sizing and ask whether valid payloads can exceed the default token limit.

  - name: scope_widening_false_negative
    severity: high
    description: >
      Missing cases where an explicit file list, stdin scope, or narrow target is silently
      widened into a directory-wide scan or operation.
    mitigation: >
      Trace the exact scope through every layer. If stdin or caller input names specific
      files, verify the implementation preserves that set rather than falling back to a parent directory.

  - name: temp_fallback_security_gap
    severity: high
    description: >
      Treating shared /tmp fallbacks as harmless operational details instead of local
      tampering or disclosure risks.
    mitigation: >
      Review temp-directory fallbacks for per-user scoping, 0700 permissions, and whether
      the data being stored is security-relevant, persistent, or coordination-critical.

  - name: partial_success_misreport
    severity: high
    description: >
      Missing bugs where fan-out, wave, or batch execution logs a warning but still reports
      success even though failed members remain.
    mitigation: >
      Evaluate externally visible success semantics, not just internal logging. If any
      required sub-operation failed, confirm the command cannot still return clean success.
