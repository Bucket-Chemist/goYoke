name: python-ux
description: >
  PySide6/Qt6 GUI development expert. Specializes in desktop application UI,
  signal/slot patterns, Model/View architecture, and Qt threading.
  Use for any Qt or PySide6 development work.

model: sonnet
thinking:
  enabled: true
  budget: 10000
  budget_complex: 14000

auto_activate:
  patterns:
    - "PySide6"
    - "PyQt"
    - "QWidget"
    - "QMainWindow"
    - "Qt"

triggers:
  - "create widget"
  - "add dialog"
  - "signal slot"
  - "QML"
  - "model view"
  - "Qt"
  - "PySide"
  - "PySide6"
  - "GUI"
  - "desktop app"
  - "QThread"

tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob

conventions_required:
  - python.md

focus_areas:
  - PySide6 widget composition
  - Signal/slot patterns
  - Model/View/Delegate
  - QThread for background work
  - QML integration
  - Qt styling (QSS)

failure_tracking:
  max_attempts: 3
  on_max_reached: "escalate_to_orchestrator"
cost_ceiling: 0.25
