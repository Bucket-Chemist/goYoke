edges:
  - name: qthread_vs_python_thread
    severity: critical
    description: >
      Python threads (threading.Thread) cannot safely interact with Qt widgets.
      All Qt operations must happen on QThreads or the main thread.
    mitigation: >
      Use QThread with worker pattern. Move QObject to thread with moveToThread().
      Communicate via signals.
    example:
      wrong: |
        import threading
        def update_ui():
            self.label.setText("Updated")  # CRASH or undefined behavior
        threading.Thread(target=update_ui).start()
      right: |
        class Worker(QObject):
            finished = Signal(str)
            def run(self):
                result = heavy_computation()
                self.finished.emit(result)

        worker = Worker()
        worker.moveToThread(thread)
        worker.finished.connect(self.label.setText)

  - name: signal_slot_memory_leak
    severity: high
    description: >
      Connecting signals without proper cleanup creates memory leaks.
      Objects with active connections won't be garbage collected.
    mitigation: >
      Use deleteLater() for Qt objects. Disconnect signals when removing
      objects. Use weak references or QPointer when holding references.
    example:
      wrong: |
        def create_widget(self):
            w = QWidget()
            self.button.clicked.connect(w.close)
            # w can never be garbage collected
      right: |
        def create_widget(self):
            w = QWidget()
            self.button.clicked.connect(w.close)
            w.destroyed.connect(lambda: self.button.clicked.disconnect())

  - name: event_loop_asyncio
    severity: high
    description: >
      Qt has its own event loop that conflicts with asyncio's event loop.
      Running both simultaneously requires special handling.
    mitigation: >
      Use qasync library to integrate asyncio with Qt event loop.
      Never call asyncio.run() in a Qt application.
    example:
      wrong: |
        async def fetch_data():
            return await some_async_call()

        # In Qt application:
        result = asyncio.run(fetch_data())  # Blocks Qt event loop!
      right: |
        from qasync import QEventLoop, asyncSlot

        @asyncSlot()
        async def fetch_data(self):
            result = await some_async_call()
            self.update_ui(result)

  - name: widget_deletion_order
    severity: high
    description: >
      Qt deletes children before parents. Accessing child widgets after
      parent deletion causes crashes. Python may hold references to
      deleted Qt objects.
    mitigation: >
      Don't store references to widgets that may be deleted. Check
      isValid() or use QPointer. Clean up Python references in
      closeEvent.
    example:
      wrong: |
        class Parent(QWidget):
            def __init__(self):
                self.child = QLabel("text", self)

            def closeEvent(self, event):
                print(self.child.text())  # May crash if child deleted
      right: |
        class Parent(QWidget):
            def __init__(self):
                self.child = QLabel("text", self)

            def closeEvent(self, event):
                if self.child and not self.child.isHidden():
                    print(self.child.text())
                super().closeEvent(event)

  - name: main_thread_ui
    severity: critical
    description: >
      All Qt widget operations MUST happen on the main thread. Updating
      widgets from background threads causes crashes or undefined behavior.
    mitigation: >
      Use signals to communicate from worker threads to main thread.
      Never call widget methods directly from QThread.
    example:
      wrong: |
        class Worker(QThread):
            def run(self):
                result = heavy_work()
                self.label.setText(result)  # CRASH - wrong thread!
      right: |
        class Worker(QThread):
            result_ready = Signal(str)
            def run(self):
                result = heavy_work()
                self.result_ready.emit(result)  # Signal is thread-safe

        worker.result_ready.connect(label.setText)  # Runs on main thread

  - name: parent_child_ownership
    severity: medium
    description: >
      Qt uses parent-child ownership for memory management. Children are
      deleted when parent is deleted. This differs from Python's GC.
    mitigation: >
      Set parent in constructor. Don't mix Python memory management with
      Qt's. Use deleteLater() instead of del.
    example:
      wrong: |
        label = QLabel("text")  # No parent - must manually delete
        del label  # May not work correctly
      right: |
        label = QLabel("text", self)  # Parent manages lifetime
        # Or if dynamic:
        label = QLabel("text")
        label.setParent(self)
        # Or for cleanup:
        label.deleteLater()

  - name: qss_specificity
    severity: medium
    description: >
      Qt StyleSheet specificity rules differ from CSS. More specific
      selectors don't always win. Object names and inheritance matter.
    mitigation: >
      Use object names for specific targeting. Test styles thoroughly.
      Avoid deeply nested selectors.
    example:
      wrong: |
        # Expecting CSS-like specificity
        """
        QWidget QPushButton { color: red; }
        QPushButton { color: blue; }
        """
      right: |
        # Use object names for specificity
        """
        QPushButton#primaryButton { color: red; }
        QPushButton { color: blue; }
        """
        button.setObjectName("primaryButton")
