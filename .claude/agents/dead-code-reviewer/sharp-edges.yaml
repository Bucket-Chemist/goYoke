version: "1.0"
updated: "2026-04-15"

sharp_edges:
  - id: dead-unused-export
    severity: high
    category: dead-code
    description: "Exported function/type with zero importers after full verification"
    symptom: "Codebase clutter, false positives in search results, polluted IDE autocomplete"
    solution: |
      Verify through full Verification Funnel: grep for symbol across entire codebase
      including non-code files. Check reflection, dynamic dispatch, config references,
      and build system consumers. If confirmed unused, delete.
    auto_inject: true

  - id: dead-orphaned-file
    severity: high
    category: dead-code
    description: "Source file with no importers (not imported by any other file)"
    symptom: "Entire file is dead weight in the repository"
    solution: |
      Verify it's not a standalone entry point (main, script, test helper, migration).
      Check build system for references. If truly orphaned, delete the file.
    auto_inject: true

  - id: dead-unused-dependency
    severity: high
    category: dead-code
    description: "Package dependency in manifest with no import in source"
    symptom: "Supply chain bloat, unnecessary security surface, transitive CVE risk"
    solution: |
      Remove from go.mod / package.json / requirements.txt.
      Run go mod tidy / npm prune / pip-autoremove.
      Check dev/build dependencies separately — they may be used in tooling only.
    auto_inject: true

  - id: dead-dynamic-false-positive
    severity: high
    category: judgment
    description: "Code appears unused but is accessed via reflection, plugins, or config"
    symptom: "Deletion breaks runtime behavior without compiler warning"
    solution: |
      Before flagging as dead:
      - Grep for string literals matching the function/type name
      - Check reflect.*, getattr, importlib usage
      - Check YAML/JSON config for code references
      - Check build tags and conditional compilation
      Set confidence < 0.7 if any dynamic access pattern found.
    auto_inject: true

  - id: dead-branch
    severity: medium
    category: dead-code
    description: "Code after unconditional return, break, or always-false condition"
    symptom: "Unreachable code, misleading to readers"
    solution: |
      Delete the unreachable code. If the condition was meant to be
      conditional, fix the logic instead.
    auto_inject: true

  - id: dead-interface-impl
    severity: high
    category: dead-code
    description: "Go type appears unused but satisfies an interface implicitly"
    symptom: "Removing type breaks interface contracts with no direct caller visible"
    solution: |
      For Go types: grep for interfaces with matching method signatures.
      Check if the type is used via interface values (no textual reference
      to the concrete type at the call site). If interface satisfaction
      confirmed, do NOT flag as dead.
    auto_inject: true

  - id: dead-barrel-reexport
    severity: medium
    category: dead-code
    description: "TypeScript barrel export appears unused but consumed by downstream package"
    symptom: "Removing re-export breaks downstream consumers in monorepo or published package"
    solution: |
      Check if the file is an index.ts re-exporting from submodules.
      Check package.json for main/exports fields indicating published surface.
      In monorepos, check other packages for imports from this barrel.
    auto_inject: true

  - id: dead-decorator-hidden
    severity: high
    category: dead-code
    description: "Function appears uncalled but registered via framework decorator"
    symptom: "Removing decorated function breaks runtime route/handler/task registration"
    solution: |
      Check for framework decorators: @app.route, @pytest.fixture,
      @click.command, @celery.task (Python); @Injectable, @Controller,
      @Module (TypeScript/NestJS). Decorator-registered code has zero
      explicit callers but is invoked by the framework.
    auto_inject: true

  - id: dead-init-sideeffect
    severity: high
    category: dead-code
    description: "Go init() or Python module-level code has side effects; removal breaks behavior"
    symptom: "Removing init function or module-level code breaks package initialization"
    solution: |
      Go: init() functions run on import — check if the package is imported
      for side effects (blank import _ "pkg"). Python: module-level code
      runs on import — check for registration, global state setup, or
      singleton initialization.
    auto_inject: true

  - id: dead-codegen-consumed
    severity: medium
    category: dead-code
    description: "Code appears unused but consumed by code generation pipeline"
    symptom: "Removing code breaks build-time generation (protobuf, go:generate, OpenAPI)"
    solution: |
      Check for go:generate directives, Makefile/Taskfile codegen targets,
      protobuf .proto files, and OpenAPI/Swagger specs referencing the symbol.
      If codegen pipeline references the symbol, do NOT flag as dead.
    auto_inject: true

  - id: dead-unused-error-type
    severity: medium
    category: dead-code
    description: "Custom error type with zero catch/handle sites"
    symptom: "Error type defined but never caught, matched, or inspected anywhere"
    solution: |
      Grep for the error type name in catch/except blocks, errors.Is/As calls,
      and type switch statements. If zero handle sites found, flag as dead.
      Check that the error isn't part of a public API consumed externally.
    auto_inject: true

  - id: dead-config-driven
    severity: medium
    category: dead-code
    description: "Code referenced only by config files (YAML, JSON route tables, feature flags)"
    symptom: "Code appears unused in source but is loaded via configuration at runtime"
    solution: |
      Search YAML, JSON, TOML, and .env files for string references to
      the symbol name. Include CI/CD configs and Dockerfiles. If config
      reference found, do NOT flag as dead — the code is config-driven.
    auto_inject: true
