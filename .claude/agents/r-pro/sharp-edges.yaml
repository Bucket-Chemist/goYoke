edges:
  - name: isS4_vs_is_class
    severity: critical
    description: >
      isS4(x) checks if object uses S4 system. is(x, "ClassName") checks if
      object is instance of specific class. These are NOT interchangeable.
    mitigation: >
      Use isS4() to check S4 vs S3. Use is(x, "ClassName") or inherits()
      to check specific class membership.
    example:
      wrong: |
        # Checking wrong thing
        if (isS4(object)) {
          # This doesn't tell you WHAT class it is
        }
      right: |
        # Check S4 system
        if (isS4(object)) {
          # Object uses S4
        }
        # Check specific class
        if (is(object, "DataContainer")) {
          # Object is DataContainer
        }

  - name: logger_interpolation_bug
    severity: critical
    description: >
      The logger package's {} interpolation FAILS inside tryCatch and
      Shiny reactive contexts. glue-style interpolation silently breaks.
    mitigation: >
      Use paste() or sprintf() for log messages in tryCatch/reactive.
      Never use {} interpolation in these contexts.
    example:
      wrong: |
        tryCatch({
          logger::log_info("Processing {filename}")  # FAILS silently
        }, error = function(e) {
          logger::log_error("Error: {e$message}")  # FAILS silently
        })
      right: |
        tryCatch({
          logger::log_info(paste("Processing", filename))
        }, error = function(e) {
          logger::log_error(paste("Error:", e$message))
        })

  - name: tidy_eval_strings
    severity: critical
    description: >
      Curly-curly {{}} is for bare column names passed as arguments.
      For STRING column names, use .data[[var]] or all_of().
    mitigation: >
      String column name → .data[[var]] or all_of(var)
      Bare column name argument → {{var}}
    example:
      wrong: |
        # column_name is a STRING like "mpg"
        filter_col <- function(df, column_name, value) {
          df |> filter({{column_name}} == value)  # WRONG
        }
      right: |
        filter_col <- function(df, column_name, value) {
          df |> filter(.data[[column_name]] == value)  # CORRECT
        }

        select_cols <- function(df, columns) {
          df |> select(all_of(columns))  # CORRECT for vector of names
        }

  - name: s4_slot_access
    severity: high
    description: >
      Direct slot access with @ is for internal package code only.
      External code should use getter/setter methods to maintain
      encapsulation and allow validation.
    mitigation: >
      Define and use accessor methods for all slots. Use @ only inside
      the package that defines the class.
    example:
      wrong: |
        # External code directly accessing slots
        value <- object@data
        object@data <- new_value  # Bypasses validation!
      right: |
        # Define accessors
        setGeneric("getData", function(x) standardGeneric("getData"))
        setMethod("getData", "MyClass", function(x) x@data)

        setGeneric("setData<-", function(x, value) standardGeneric("setData<-"))
        setReplaceMethod("setData", "MyClass", function(x, value) {
          x@data <- value
          validObject(x)  # Validate!
          x
        })

        # Use accessors
        value <- getData(object)
        setData(object) <- new_value

  - name: r6_reference_semantics
    severity: high
    description: >
      R6 objects have reference semantics - assignment doesn't copy.
      This differs from base R and causes unexpected mutations.
    mitigation: >
      Use $clone() for copies. Document reference behavior clearly.
      Be explicit about when methods mutate vs return new objects.
    example:
      wrong: |
        obj1 <- MyR6Class$new()
        obj2 <- obj1  # NOT a copy!
        obj2$value <- 100
        print(obj1$value)  # Also 100 - same object!
      right: |
        obj1 <- MyR6Class$new()
        obj2 <- obj1$clone()  # Actual copy
        obj2$value <- 100
        print(obj1$value)  # Original value preserved

  - name: gc_large_objects
    severity: medium
    description: >
      R doesn't immediately free memory when large objects go out of scope.
      Explicit gc() may be needed in memory-constrained workflows.
    mitigation: >
      Call gc() after removing large objects. Use rm() to explicitly
      remove objects before gc().
    example:
      wrong: |
        process_large_data <- function(file) {
          big_data <- read_huge_file(file)
          result <- summarize(big_data)
          return(result)
          # big_data stays in memory until R feels like cleaning up
        }
      right: |
        process_large_data <- function(file) {
          big_data <- read_huge_file(file)
          result <- summarize(big_data)
          rm(big_data)
          gc()  # Free memory now
          return(result)
        }

  - name: namespace_in_packages
    severity: high
    description: >
      Functions from other packages must be namespaced in package code.
      Relying on library() or Depends causes CRAN check failures and
      hard-to-debug issues.
    mitigation: >
      Always use package::function() syntax. Add to Imports in DESCRIPTION.
      Use @importFrom only for operators like %>%.
    example:
      wrong: |
        # In package code
        my_function <- function(df) {
          df %>% filter(x > 0)  # Where does filter come from?
        }
      right: |
        my_function <- function(df) {
          df |>
            dplyr::filter(x > 0)
        }
