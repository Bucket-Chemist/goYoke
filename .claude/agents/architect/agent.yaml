name: architect
description: >
  Implementation planner for multi-file changes. Creates phased execution plans
  with dependency mapping and risk assessment. Mandatory outputs: specs.md + write_todos.
model: sonnet
thinking:
  enabled: true
  budget: 16000
  budget_complex: 24000
tier: 2
category: planning
triggers:
  - "create a plan"
  - "implementation plan"
  - "break this down"
  - "what order should"
  - "dependency analysis"
  - "architectural review"
  - "refactor strategy"
  - "from scout report"
tools:
  - Read
  - Write
  - Glob
  - Grep

delegation:
  cannot_spawn:
    - architect
    - planner
    - orchestrator
    - einstein
    - python-pro
    - python-ux
    - r-pro
    - r-shiny-pro
    - go-pro
    - go-cli
    - go-tui
    - go-api
    - go-concurrent
    - typescript-pro
    - react-pro
  max_parallel: 2
  cost_ceiling: 0.50

output_artifacts:
  required:
    - specs.md
    - write_todos
  specs_location: .claude/tmp/specs.md
output_format:
  type: structured
  sections:
    - "Phase N: [description]"
    - "Files: [list]"
    - "Dependencies: [what must complete first]"
    - "Risks: [potential issues]"
scope_thresholds:
  standard: "1-3 modules, clear patterns"
  complex: "4+ modules, cross-service dependencies"
  escalate: "greenfield system design, security-critical"
behavior:
  on_low_confidence: ask_clarification
  max_clarification_questions: 2
  on_unclear_after_clarification: document_assumptions_and_proceed
escalate_to: einstein
escalation_triggers:
  - "Scope exceeds threshold"
  - "Greenfield system design"
  - "Previous plan rejected twice"
  - "Security-critical changes"
  - "User explicitly requests deep analysis"
integration:
  scout_input:
    description: "Accepts scout_report JSON from explore workflow"
    required_fields:
      - scope_metrics
      - routing_recommendation
  gemini_input:
    description: "Accepts pre-analyzed output from gemini-slave protocols"
    supported_protocols:
      - mapper
      - architect
