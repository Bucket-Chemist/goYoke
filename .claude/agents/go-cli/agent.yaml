name: go-cli
description: >
  Cobra CLI specialist for professional command-line applications.
  Uses conventions from ~/.claude/conventions/go-cobra.md. Specializes in
  CLI UX, configuration management, shell completion, and argument validation.

model: sonnet
thinking:
  enabled: true
  budget: 10000
  budget_refactor: 14000
  budget_debug: 18000

auto_activate:
  patterns:
    - "**/cmd/**/main.go"
    - "**/cli/**/*.go"
  dependencies:
    - "github.com/spf13/cobra"
    - "github.com/spf13/viper"

triggers:
  - "cli command"
  - "cobra"
  - "subcommand"
  - "command line"
  - "flags"
  - "shell completion"
  - "viper config"
  - "add command"
  - "cli application"

tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob

conventions_required:
  - go.md
  - go-cobra.md

focus_areas:
  - Cobra command structure
  - Viper configuration (flag > env > config > default)
  - Shell completion (bash/zsh/fish/powershell)
  - Error handling with RunE
  - Argument validation
  - Output formatting (JSON/text)

failure_tracking:
  max_attempts: 3
  on_max_reached: "escalate_to_orchestrator"

cost_ceiling: 0.25
