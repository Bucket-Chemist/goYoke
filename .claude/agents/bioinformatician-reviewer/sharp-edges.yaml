edges:
  - id: bioinfo-repro-mutable-tag
    severity: critical
    description: Container image referenced by mutable tag, not SHA256 digest
    detection: "grep -rn 'container|docker|singularity' --include='*.nf' --include='*.wdl' --include='*.smk' — check for @sha256: absence"
    mitigation: "Pin all container images by SHA256 digest; record digest in pipeline config"

  - id: bioinfo-repro-unlocked-env
    severity: critical
    description: Conda/pip/renv environment without version lockfile
    detection: "Glob for environment.yml, requirements.txt, renv.lock — check for >=, ~=, or missing =="
    mitigation: "Generate lockfile (conda-lock, pip freeze, renv::snapshot); commit to repository"

  - id: bioinfo-repro-no-engine-version
    severity: warning
    description: Workflow engine version not pinned in pipeline definition
    detection: "Grep for nextflowVersion, min_version, version 1. in main workflow file"
    mitigation: "Add nextflowVersion directive (NF), min_version() (SM), or version declaration (WDL)"

  - id: bioinfo-repro-mutable-reference
    severity: critical
    description: Reference data fetched at runtime from mutable URL
    detection: "grep -rn 'wget|curl|gsutil cp|aws s3' --include='*.nf' --include='*.wdl' --include='*.smk' inside process/rule blocks"
    mitigation: "Download once, compute checksum, store as versioned artifact, verify on use"

  - id: bioinfo-repro-no-seed
    severity: critical
    description: Random seed not set for stochastic processes
    detection: "grep -rn 'bootstrap|sample|shuffle|random|mcmc|train' --include='*.py' --include='*.R' — check for seed nearby"
    mitigation: "Set explicit seed for all stochastic steps; document seed in run parameters"

  - id: bioinfo-repro-mutable-base
    severity: warning
    description: Dockerfile FROM without SHA256 digest or using latest tag
    detection: "grep -n '^FROM' Dockerfile* — check for @sha256: or :latest"
    mitigation: "Pin base image by digest; use deterministic package installation"

  - id: bioinfo-arch-silent-fail
    severity: critical
    description: Pipeline continues after step failure; errorStrategy ignore or missing set -euo pipefail
    detection: "grep -rn 'errorStrategy.*ignore|set +e|2>/dev/null' --include='*.nf' --include='*.smk'"
    mitigation: "Use targeted errorStrategy for transient failures (OOM/signal); fail on logical errors"

  - id: bioinfo-arch-resume-stale
    severity: critical
    description: Resume/caching mechanism reuses stale outputs from different parameter runs
    detection: "grep -rn 'publishDir.*move|--rerun-triggers.*mtime' --include='*.nf' --include='*.smk'"
    mitigation: "Use publishDir mode copy/link (NF); add input content to rerun triggers (SM)"

  - id: bioinfo-arch-no-validation
    severity: warning
    description: No input file validation before processing starts
    detection: "Check first process/rule for file existence assertions or format checks"
    mitigation: "Add input validation step: file existence, format check, expected size range"

  - id: bioinfo-arch-retry-unbounded
    severity: warning
    description: Retry logic without maxRetries bound
    detection: "grep -rn 'errorStrategy.*retry' --include='*.nf' — check for maxRetries"
    mitigation: "Set maxRetries 2-3; use exponential backoff for transient failures"

  - id: bioinfo-arch-race-condition
    severity: critical
    description: Parallel execution race condition on shared temp files
    detection: "grep -rn 'temp(' --include='*.smk' — check if output consumed by multiple downstream rules"
    mitigation: "Use shadow copy on consuming rules; avoid temp() on files with multiple consumers"

  - id: bioinfo-arch-non-atomic
    severity: warning
    description: Output written directly to final path without atomic rename
    detection: "Check process/rule shell blocks for direct output path writes without tmp staging"
    mitigation: "Write to temp file, then mv/rename to final path"

  - id: bioinfo-arch-wdl-portability
    severity: warning
    description: WDL runtime block uses backend-specific attributes not portable across Cromwell/miniwdl/Terra
    detection: "grep -rn 'zones|bootDiskSizeGb|gpuType' --include='*.wdl' in runtime blocks"
    mitigation: "Isolate backend-specific attributes in separate options file; document portability limitations"

  - id: bioinfo-stat-no-mtc
    severity: critical
    description: Multiple testing correction absent when multiple comparisons performed
    detection: "grep -rn 'p.value|pvalue|p_value' --include='*.R' --include='*.py' — check for p.adjust|multipletests|qvalue"
    mitigation: "Apply BH FDR correction or equivalent; document correction method"

  - id: bioinfo-stat-wrong-test
    severity: warning
    description: Statistical test assumptions not verified computationally before test
    detection: "grep -rn 't.test|t_test|ttest_ind|chisq.test' --include='*.R' --include='*.py' — check for preceding normality tests"
    mitigation: "Add normality test before parametric tests; document assumption verification"

  - id: bioinfo-stat-no-effect-size
    severity: warning
    description: P-values reported without effect sizes or confidence intervals
    detection: "grep -rn 'p.value|pvalue' --include='*.R' --include='*.py' — check for fold_change|cohens_d|odds_ratio"
    mitigation: "Report effect sizes alongside p-values; include confidence intervals"

  - id: bioinfo-resource-no-memory
    severity: warning
    description: No memory declaration on processes; defaults cause OOM or waste
    detection: "Grep for memory, mem_mb, runtime { memory: in process/rule definitions"
    mitigation: "Declare memory per process based on input size; use dynamic resource allocation"

  - id: bioinfo-resource-no-cleanup
    severity: warning
    description: Intermediate files never cleaned; TB accumulate across runs
    detection: "Check for temp() usage (SM), cleanup config (NF), cleanup tasks (WDL)"
    mitigation: "Mark large intermediates as temp; configure work dir cleanup policy"

  - id: bioinfo-audit-no-versions
    severity: warning
    description: Software versions not recorded in pipeline output metadata
    detection: "grep -rn 'version|--version' --include='*.nf' --include='*.smk' --include='*.wdl' in output blocks"
    mitigation: "Add version capture step per process; aggregate into run metadata file"

  - id: bioinfo-audit-no-params
    severity: warning
    description: Run parameters not logged alongside results
    detection: "Check for config/params dump step; NF params serialization; SM config archival"
    mitigation: "Archive config file with outputs; log CLI overrides; include in audit trail"
