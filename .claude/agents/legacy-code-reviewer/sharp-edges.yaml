version: "1.0"
updated: "2026-04-15"

sharp_edges:
  - id: deprecated-no-removal
    severity: high
    category: legacy
    description: "@deprecated annotation with no removal timeline or tracking"
    symptom: "Deprecated code lingers indefinitely, new code accidentally uses it"
    solution: |
      If the replacement exists and all callers migrated: delete.
      If callers remain: add removal timeline (version or date) and
      track in issue tracker. Flag remaining callers.
    auto_inject: true

  - id: compat-shim
    severity: high
    category: legacy
    description: "Backward-compatibility wrapper (old API delegates to new API)"
    symptom: "Indirection layer, two names for same thing, confusion"
    solution: |
      Check for callers of the old API. If zero: delete the shim.
      If callers exist: migrate callers to new API, then delete shim.
      If external consumers: deprecate with timeline.
    auto_inject: true

  - id: stale-feature-flag
    severity: medium
    category: legacy
    description: "Feature flag that always evaluates to the same value"
    symptom: "Dead branch, unnecessary conditional, confusion"
    solution: |
      Collapse the conditional:
      - If always true: keep the true branch, delete false branch and flag check
      - If always false: delete both branches and flag check
      Verify by checking config files and environment variables.
    auto_inject: true

  - id: dual-code-path
    severity: medium
    category: legacy
    description: "Two implementations of the same thing with a conditional switch"
    symptom: "Double maintenance burden, unclear which is canonical"
    solution: |
      Determine which path is active. If the old path is unreachable:
      delete old path, remove the conditional, keep new path.
      If both are active: that's a feature flag — check if it's stale.
    auto_inject: true

  - id: migration-artifact
    severity: medium
    category: legacy
    description: "Code or comments referencing a completed migration"
    symptom: "Misleading context, suggests work is still in progress"
    solution: |
      Delete migration-specific code (compat types, data transformers,
      old schema references). Remove migration comments.
      Verify migration is actually complete (no old data in production).
    auto_inject: true
