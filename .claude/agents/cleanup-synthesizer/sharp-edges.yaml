version: "1.0"
updated: "2026-04-15"

sharp_edges:
  - id: missed-causal-chain
    severity: high
    category: synthesis
    description: "Related findings from different agents not linked as a causal chain"
    symptom: "User fixes symptoms instead of root cause, findings reappear"
    solution: |
      Check for spatial overlap (same file/lines) and tag overlap
      (same module/symbol). When findings from 2+ agents touch the
      same code, investigate whether one is the cause of the others.
    auto_inject: true

  - id: false-dedup
    severity: medium
    category: synthesis
    description: "Merging findings that are actually distinct problems in same location"
    symptom: "User misses a problem because it was merged into another"
    solution: |
      Only merge findings that describe the SAME problem from
      different angles. Two different problems in the same file
      should remain separate findings, just noted as co-located.
    auto_inject: true

  - id: wrong-phase-ordering
    severity: high
    category: synthesis
    description: "Remediation phase ordering violates dependency constraints"
    symptom: "User attempts fix that's blocked by an unfixed prerequisite"
    solution: |
      Structural fixes (cycles) MUST precede consolidation.
      Dead code removal SHOULD precede deduplication.
      Type consolidation MUST precede type safety fixes.
      Slop cleanup is always last.
    auto_inject: true
