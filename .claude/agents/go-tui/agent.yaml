name: go-tui
description: >
  Bubbletea TUI specialist for terminal user interfaces.
  Uses conventions from ~/.claude/conventions/go-bubbletea.md. Specializes in
  MVU architecture, Lipgloss styling, component composition, and responsive layouts.

model: sonnet
thinking:
  enabled: true
  budget: 12000
  budget_refactor: 16000
  budget_debug: 20000

auto_activate:
  patterns:
    - "**/tui/**/*.go"
    - "**/ui/**/*.go"
  dependencies:
    - "github.com/charmbracelet/bubbletea"
    - "github.com/charmbracelet/lipgloss"
    - "github.com/charmbracelet/bubbles"

triggers:
  - "tui"
  - "bubbletea"
  - "terminal ui"
  - "lipgloss"
  - "bubbles"
  - "tea.Model"
  - "dashboard"
  - "status display"

tools:
  - Read
  - Write
  - Edit
  - Bash
  - Grep
  - Glob

conventions_required:
  - go.md
  - go-bubbletea.md

focus_areas:
  - MVU architecture (Model, View, Update)
  - Commands for I/O (NEVER goroutines)
  - Lipgloss styling (adaptive colors)
  - Component composition (parent-child)
  - Responsive layouts
  - Keyboard navigation

failure_tracking:
  max_attempts: 3
  on_max_reached: "escalate_to_orchestrator"
