# Sharp Edges for React Pro Agent
# These are common pitfalls and learned gotchas

version: "1.0"
updated: "2026-02-01"

sharp_edges:
  - id: stale-closures
    severity: critical
    category: hooks
    description: "Closures in useEffect/useCallback capture stale values"
    symptom: "Using old prop/state values instead of current ones"
    solution: |
      Include ALL dependencies in dependency array:
      useEffect(() => {
        doSomething(userId); // userId MUST be in deps
      }, [userId]);

      Or use functional updates:
      setCount(prevCount => prevCount + 1);

      Enable eslint-plugin-react-hooks for warnings
    auto_inject: true

  - id: missing-dependencies
    severity: critical
    category: hooks
    description: "Missing dependencies in useEffect/useCallback/useMemo"
    symptom: "Stale values, unexpected behavior, bugs that appear randomly"
    solution: |
      ALWAYS include all dependencies
      Use ESLint react-hooks/exhaustive-deps rule
      If you want to ignore, use functional updates or useRef
      NEVER disable the warning without understanding why
    auto_inject: true

  - id: infinite-loops
    severity: critical
    category: hooks
    description: "useEffect causing infinite re-render loops"
    symptom: "Browser freezes, max update depth exceeded error"
    solution: |
      Common causes:
      1. Missing dependency array: useEffect(() => {})
      2. Object/array in deps: useEffect(() => {}, [{ x: 1 }])
      3. State update that triggers itself

      Fix:
      - Add dependency array
      - Use useMemo for objects/arrays in deps
      - Check if state update is conditional
    auto_inject: true

  - id: memory-leaks
    severity: high
    category: hooks
    description: "Not cleaning up effects (subscriptions, timers, listeners)"
    symptom: "Memory grows over time, warnings about state updates on unmounted components"
    solution: |
      ALWAYS return cleanup function from useEffect:
      useEffect(() => {
        const subscription = api.subscribe(handler);
        return () => subscription.unsubscribe();
      }, []);

      Use cancellation flags for async:
      useEffect(() => {
        let cancelled = false;
        loadData().then(data => {
          if (!cancelled) setData(data);
        });
        return () => { cancelled = true };
      }, []);
    auto_inject: true

  - id: key-prop-misuse
    severity: high
    category: rendering
    description: "Using array index as key in dynamic lists"
    symptom: "Items re-render incorrectly, state gets mixed up between items"
    solution: |
      NEVER use index as key for dynamic lists:
      {items.map((item, i) => <Item key={i} />)} // WRONG

      Use stable unique identifier:
      {items.map(item => <Item key={item.id} />)} // CORRECT

      Index is OK only for static lists that never reorder
    auto_inject: true

  - id: useeffect-cleanup
    severity: high
    category: hooks
    description: "Cleanup function called at wrong time or not at all"
    symptom: "Race conditions, memory leaks, double subscriptions"
    solution: |
      Cleanup runs:
      1. Before effect runs again (if deps changed)
      2. When component unmounts

      Common pattern:
      useEffect(() => {
        const controller = new AbortController();
        fetch(url, { signal: controller.signal });
        return () => controller.abort(); // Cleanup
      }, [url]);
    auto_inject: true

  - id: inline-object-literals
    severity: medium
    category: performance
    description: "Creating new objects/arrays every render in JSX"
    symptom: "Child components re-render unnecessarily, poor performance"
    solution: |
      WRONG:
      <Component config={{ x: 1 }} /> // New object every render
      <Component items={[1, 2, 3]} /> // New array every render

      CORRECT:
      const config = useMemo(() => ({ x: 1 }), []);
      <Component config={config} />

      Or define outside component if static
    auto_inject: true

  - id: context-performance
    severity: medium
    category: state-management
    description: "Context causing unnecessary re-renders"
    symptom: "Every consumer re-renders when any context value changes"
    solution: |
      Split contexts by update frequency:
      - Fast-changing: Use Zustand instead
      - Slow-changing: Context is fine

      Or use separate contexts:
      <UserContext.Provider value={user}>
        <ThemeContext.Provider value={theme}>

      Or memoize context value:
      const value = useMemo(() => ({ user, setUser }), [user]);
    auto_inject: true

  - id: ink-terminal-size
    severity: medium
    category: ink
    description: "Not handling terminal resize in Ink components"
    symptom: "Layout breaks when terminal is resized"
    solution: |
      Use useStdout hook:
      const { stdout } = useStdout();
      const width = stdout.columns;

      Update layout when terminal resizes (handled by Ink)
      Test with different terminal sizes
    auto_inject: true

  - id: ink-input-handling
    severity: medium
    category: ink
    description: "Multiple useInput hooks conflicting"
    symptom: "Input not working as expected, keys captured by wrong handler"
    solution: |
      Only one useInput per focused component
      Use isActive prop to control which component handles input:

      const isActive = true;
      useInput((input, key) => {
        // ...
      }, { isActive });

      Or use controlled input components from ink-text-input
    auto_inject: true

  - id: react-strict-mode-double-render
    severity: low
    category: development
    description: "Effects running twice in development with StrictMode"
    symptom: "API called twice, subscriptions duplicated in dev"
    solution: |
      This is INTENTIONAL in React 18 StrictMode
      Helps find bugs where cleanup is missing

      Does NOT happen in production
      If it breaks your code, you need cleanup:
      useEffect(() => {
        const sub = subscribe();
        return () => unsubscribe(sub); // This prevents double-sub
      }, []);
    auto_inject: false

  - id: use-hook-try-catch
    severity: critical
    category: react-19
    description: "use() hook cannot be called inside try/catch"
    symptom: "Runtime error when using use() in try/catch"
    solution: |
      WRONG:
      try {
        const data = use(promise);
      } catch (e) {}

      CORRECT: Use Error Boundary components instead of try/catch
    auto_inject: true

  - id: use-hook-stable-promise
    severity: critical
    category: react-19
    description: "use() requires stable promise references"
    symptom: "Infinite loop when promise created during render"
    solution: |
      WRONG:
      function Component() {
        const data = use(fetch('/api')); // New promise each render!
      }

      CORRECT:
      const dataPromise = fetch('/api'); // Outside component or cached
      function Component() {
        const data = use(dataPromise);
      }
    auto_inject: true

  - id: useformstatus-child-component
    severity: high
    category: react-19
    description: "useFormStatus must be called in child of <form>"
    symptom: "pending is always false"
    solution: |
      WRONG:
      function Form() {
        const { pending } = useFormStatus(); // Won't work
        return <form>...</form>;
      }

      CORRECT:
      function SubmitButton() {
        const { pending } = useFormStatus(); // In child component
        return <button disabled={pending}>Submit</button>;
      }
    auto_inject: true

  - id: server-component-hooks
    severity: critical
    category: react-19
    description: "Server Components cannot use hooks"
    symptom: "Build error or runtime crash when using useState/useEffect in Server Component"
    solution: |
      Server Components (no 'use client' directive) cannot use:
      - useState, useEffect, useRef, etc.
      - Event handlers (onClick, onChange, etc.)
      - Browser-only APIs

      Add 'use client' at top of file for interactive components.
    auto_inject: true

  - id: react-compiler-rules
    severity: high
    category: react-19
    description: "React Compiler requires Rules of React compliance"
    symptom: "Compiler errors or incorrect optimization"
    solution: |
      When React Compiler is enabled, components MUST:
      - Be pure (same props = same output)
      - Never mutate props or state
      - Keep side effects outside render

      The compiler will skip components that violate these rules.
    auto_inject: true
