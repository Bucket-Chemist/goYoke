# Sharp Edges for GO Pro Agent
# These are common pitfalls and learned gotchas

version: "1.1"
updated: "2026-04-11"

sharp_edges:
  - id: loop-variable-capture
    severity: medium
    category: concurrency
    description: "Loop variable capture in goroutines (Go <1.22)"
    symptom: "All goroutines see the same value (pre-1.22 only)"
    solution: |
      Go 1.22+ FIXED this issue - each iteration creates new variables.

      Go 1.22+: Works correctly without manual capture
      for _, item := range items {
          go func() { process(item) }()  // Now works!
      }

      Pre-1.22 or for explicit clarity:
      for _, item := range items {
          item := item  // Still valid for backwards compatibility
          go func() { process(item) }()
      }
    auto_inject: true

  - id: nil-slice-vs-empty
    severity: medium
    category: semantics
    description: "nil slice vs empty slice JSON encoding"
    symptom: "nil slice encodes as 'null', empty slice as '[]'"
    solution: |
      var s []int        // nil slice, json: null
      s := []int{}       // empty slice, json: []
      s := make([]int,0) // empty slice, json: []
    auto_inject: true

  - id: defer-in-loops
    severity: high
    category: resource-management
    description: "defer accumulates until function returns"
    symptom: "Resources not released until function ends"
    solution: |
      Use anonymous function to scope defer:
      for _, file := range files {
          func() {
              f, _ := os.Open(file)
              defer f.Close()
              // ... use f ...
          }()
      }
    auto_inject: true

  - id: channel-closing
    severity: high
    category: concurrency
    description: "Only senders should close channels"
    symptom: "Panic on send to closed channel"
    solution: |
      - Only the sender closes the channel
      - Never close from receiver side
      - Closing twice causes panic
    auto_inject: true

  - id: default-http-client
    severity: critical
    category: networking
    description: "Default http.Client has no timeout"
    symptom: "Requests hang indefinitely"
    solution: |
      NEVER use http.DefaultClient
      Always configure Timeout and Transport
    auto_inject: true

  - id: context-propagation
    severity: high
    category: concurrency
    description: "Context must flow through all blocking operations"
    symptom: "Goroutine leaks, operations not cancelled"
    solution: |
      Always accept ctx context.Context as first parameter
      Check ctx.Done() in long-running operations
    auto_inject: true

  - id: error-wrapping
    severity: medium
    category: error-handling
    description: "Use %w for wrappable errors, %v for non-wrappable"
    symptom: "errors.Is/As don't work as expected"
    solution: |
      fmt.Errorf("context: %w", err)  // Wrappable
      fmt.Errorf("context: %v", err)  // Not wrappable (breaks chain)
    auto_inject: true

  - id: enhanced-http-routing
    severity: low
    category: http
    description: "Go 1.22 enhanced routing patterns"
    symptom: "Using third-party router for simple method matching"
    solution: |
      Go 1.22+ net/http supports method and wildcard routing:

      mux.HandleFunc("GET /users/{id}", getUser)
      mux.HandleFunc("POST /users", createUser)
      mux.HandleFunc("/files/{path...}", serveFiles)

      Access path values with r.PathValue("id").
      Consider if third-party router is still needed.
    auto_inject: false

  - id: slog-structured-logging
    severity: low
    category: logging
    description: "Use slog for structured logging (Go 1.21+)"
    symptom: "Using log package or third-party logger for new code"
    solution: |
      Prefer stdlib slog for structured logging:

      logger := slog.New(slog.NewJSONHandler(os.Stdout, nil))
      logger.Info("request",
          "method", r.Method,
          "path", r.URL.Path,
          "duration_ms", elapsed.Milliseconds(),
      )
    auto_inject: false

  - id: jsonl-scanner-limit
    severity: high
    category: io
    description: "Default bufio.Scanner token limit truncates valid JSONL or NDJSON records"
    symptom: "Large transcript, telemetry, session, or log entries fail with ErrTooLong or silently disappear"
    solution: |
      NEVER use the default scanner buffer for JSONL or NDJSON streams that may
      carry tool output, telemetry, or serialized payloads.

      scanner := bufio.NewScanner(r)
      scanner.Buffer(make([]byte, 0, 64*1024), 10*1024*1024)

      Prefer a shared helper so all JSONL readers enforce the same ceiling.
    auto_inject: true

  - id: shared-temp-fallback
    severity: high
    category: filesystem
    description: "Shared /tmp fallback directories expose runtime state to other local users"
    symptom: "Fallback caches, telemetry, or guards land in predictable world-readable temp paths"
    solution: |
      Avoid shared temp roots like /tmp/app-data or /tmp/app-fallback.
      Use a per-user directory name and force 0700 permissions.

      Validate writability without broadening existing permissions.
    auto_inject: true

  - id: path-component-sanitization
    severity: high
    category: filesystem
    description: "Raw identifiers embedded in filenames can escape or reshape target paths"
    symptom: "session_id, tool names, or user-derived strings alter the resolved cache/log path"
    solution: |
      NEVER write raw user- or session-derived strings into filenames.
      Hash, sanitize, or map them to a safe slug before joining into paths.
    auto_inject: true
