edges:
  - name: generic_inflation
    severity: critical
    description: >
      Expanding a domain-specific agent with checklist items that apply to any
      codebase ("verify error handling", "check for null pointers") rather than
      items requiring domain expertise. The expanded agent looks comprehensive
      but catches nothing a generalist reviewer wouldn't already catch.
    mitigation: >
      Apply the domain expertise test to every checklist item: "Would a senior
      engineer WITHOUT domain expertise know to check this?" If yes, the item
      is generic and must be replaced with a domain-specific variant or removed.

  - name: research_regurgitation
    severity: critical
    description: >
      Dumping upstream domain research verbatim into the agent body as prose
      paragraphs instead of transforming it into code-verifiable checklist items,
      severity examples, and sharp edge entries. The agent becomes a textbook
      instead of a review tool.
    mitigation: >
      Every piece of domain research must pass through the code-verifiability
      filter: "Can a reviewer detect this by reading code?" If not, discard it.
      If yes, transform it into the Why/Look-for/Common-mistake structure.

  - name: scope_creep_beyond_code
    severity: high
    description: >
      Adding checklist items about experimental design, scientific methodology,
      or domain decisions that cannot be verified from code alone. Example:
      "Verify that the appropriate statistical test was chosen for the data
      distribution" — this requires understanding the experiment, not the code.
    mitigation: >
      Restrict all checklist items to what is observable in source code:
      function calls, parameter values, file I/O patterns, data transformations,
      error handling paths. The agent reviews CODE, not SCIENCE.

  - name: frontmatter_contamination
    severity: critical
    description: >
      Modifying frontmatter fields (description, triggers, focus_areas, model,
      tools) during body expansion. The skill manages frontmatter; the architect
      manages body content only. Frontmatter changes can break routing, tool
      access, and agent registration.
    mitigation: >
      Parse the frontmatter boundary (second `---` line) before writing.
      Never output content above this boundary. If frontmatter improvements
      are warranted, note them in expansion-report.md as recommendations
      for the user — never apply them directly.

  - name: reference_cargo_culting
    severity: high
    description: >
      Copying structural patterns from the reference agent (typically
      backend-reviewer) that don't apply to the target domain. Example:
      including SQL injection checks in a genomics pipeline reviewer because
      the reference agent had them. The expanded agent contains authoritative-
      looking but irrelevant content.
    mitigation: >
      After drafting expansion, review each item against the target agent's
      domain metadata (description, focus_areas). If an item traces to the
      reference agent rather than the target domain, remove it. The reference
      agent provides STRUCTURE, not CONTENT.

  - name: orphaned_severity_examples
    severity: high
    description: >
      Severity examples that no checklist item would catch, or checklist items
      with no corresponding severity example showing what happens when the check
      fails. The agent's content is internally inconsistent — it warns about
      failure modes it can't detect, or has checks with no justification.
    mitigation: >
      Run the cross-reference validation in Phase 6. Every severity example
      should map to at least one checklist item. Every P0/P1 checklist item
      should have at least one severity example showing the consequence.

  - name: abstract_severity
    severity: high
    description: >
      Severity examples that describe failures in abstract terms without naming
      the specific tool, parameter, or data transformation involved. "Using
      incorrect parameters" tells the reviewer nothing. "Setting MSFragger
      precursor_mass_tolerance to 20ppm for ion trap data" tells them exactly
      what to look for.
    mitigation: >
      Every severity example must contain at least one named tool/library/
      function AND at least one specific parameter/value/format. If you can't
      name specifics, the example is too abstract and needs domain grounding.

  - name: voice_contamination
    severity: medium
    description: >
      Writing meta-commentary about the expansion process into the agent body.
      Phrases like "This section was expanded to cover...", "Based on best
      practices...", or "The following checklist addresses..." are expansion
      artifacts, not agent instructions. They waste context window tokens and
      confuse the agent's self-model.
    mitigation: >
      The agent body is a system prompt — it speaks AS the agent, not ABOUT
      the agent. Use imperative voice for review agents ("Check that...",
      "Verify..."). Route all meta-commentary to expansion-report.md.

  - name: tool_hallucination
    severity: critical
    description: >
      Referencing tools, libraries, parameters, or file formats that don't
      exist in the target domain. The agent instructs reviewers to check for
      functions or settings that are fabricated, causing confusion and wasted
      review cycles. This is especially likely when the architect generates
      domain content from training knowledge without upstream research validation.
    mitigation: >
      Cross-reference all named tools/libraries against the domain research
      from upstream agents. If no upstream research is available (refine mode),
      only reference tools already named in the agent's existing content or
      well-established tools with stable APIs. When uncertain, use the generic
      pattern ("the search engine's FDR parameter") rather than a specific
      name that might be wrong.

  - name: completeness_theater
    severity: medium
    description: >
      Generating 30+ thin checklist items to hit a quantity target instead of
      20 deep items with full Why/Look-for/Common-mistake components. The
      agent looks thorough but each check is too shallow to be actionable.
      Reviewers see the wall of checkboxes and skim rather than engage.
    mitigation: >
      Quality gate: every checklist item must have all three sub-components
      (Why, Look-for, Common-mistake) with at least one sentence each. If
      you can't write a substantive Common-mistake, the check is too obvious
      to include. Target 20-25 deep items over 30+ shallow ones.

  - name: immutable_section_modification
    severity: critical
    description: >
      Rephrasing, reordering, or "improving" sections marked as immutable
      (Output Format, Parallelization, CRITICAL file-reading warnings). These
      sections are calibrated for operational correctness and have been tested
      in production. Even well-intentioned edits can break agent behavior.
    mitigation: >
      In Phase 1 (Structural Analysis), identify all immutable sections by
      heading name. Copy them byte-for-byte into the expanded output. Do not
      read them for content; treat them as opaque blocks.

  - name: identity_domain_collapse
    severity: high
    description: >
      Writing an identity statement so broad it could describe multiple agents.
      "You review bioinformatics code" applies to genomics, proteomics,
      metabolomics, and structural biology reviewers equally. The agent has
      no unique analytical lens and will produce generic reviews.
    mitigation: >
      The identity statement must pass the substitution test: if you replace
      the domain name with a sibling domain, does the statement still work?
      If yes, it's too broad. Add specific tools, data formats, failure modes,
      and analytical workflows unique to THIS agent's domain.

  - name: sharp_edge_id_collision
    severity: medium
    description: >
      Creating sharp edge IDs that collide with existing IDs in other agents
      or using inconsistent naming conventions. IDs like "data-error" are too
      generic and will collide. IDs like "PROT_FDR_01" don't follow the
      {domain}-{issue} convention.
    mitigation: >
      Use the strict format: {domain}-{specific-issue} where domain matches
      the agent's primary domain prefix and specific-issue is a 2-4 word
      hyphenated slug. Check existing agents in the same category for
      ID prefix conventions before generating new IDs.

  - name: schema_misrouting
    severity: high
    description: >
      Schema-architect invoked for non-schema tasks such as general architecture
      planning, implementation design, or code review. This agent produces agent
      content (checklists, severity tables, sharp edges, identity statements) —
      not application code or implementation plans. Misrouting wastes an Opus
      invocation on work better handled by architect or python-architect.
    mitigation: >
      Check the request against the agent's trigger patterns: "extend agent",
      "expand agent schema", "refine agent definition". If the request is about
      application architecture, route to architect. If about ML design, route
      to python-architect. Schema-architect only handles .claude/agents/ content.

  - name: schema_spawn_violation
    severity: high
    description: >
      Schema-architect attempting to spawn other agents. This is a leaf agent
      with can_spawn: [] and max_parallel: 0. Any spawn attempt indicates the
      agent is exceeding its scope — schema extension is inherently sequential
      and self-contained. The agent should produce expanded-body.md and
      expansion-report.md directly, not delegate to sub-agents.
    mitigation: >
      If the agent needs domain research it cannot derive from its own training
      knowledge, the correct path is braintrust mode via the schema-extend skill
      (which spawns Mozart, not schema-architect). Schema-architect consumes
      research; it does not produce it.

  - name: schema_frontmatter_removed_fields
    severity: medium
    description: >
      During goYoke integration (2026-04-09), the following non-standard
      frontmatter fields were removed from the original agent definition:
      delegation.cannot_spawn (replaced by can_spawn allowlist), delegation.max_parallel,
      delegation.cost_ceiling, output_format (type/sections), scope_thresholds
      (standard/complex/escalate), behavior (on_low_confidence, max_clarification_questions,
      on_unclear_after_clarification). The behavioral intent of these fields is preserved
      in the agent body (PARALLELIZATION: NONE section, Expansion Protocol, Quality Standards).
    mitigation: >
      If the agent exhibits unexpected behavior around parallelization, clarification
      questions, or scope decisions, check the body sections rather than frontmatter.
      The removed fields were non-standard and not parsed by any goYoke binary.
