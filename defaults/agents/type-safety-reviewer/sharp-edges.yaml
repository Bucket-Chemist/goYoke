version: "1.0"
updated: "2026-04-16"

sharp_edges:
  - id: tsafe-explicit-any
    severity: high
    category: type-safety
    description: "Explicitly typed as any/interface{}/Any where a specific type is determinable"
    symptom: "Type checking disabled, bugs pass silently through compilation"
    solution: |
      Trace the value's source and consumers to determine the real type.
      If from an API: use the API's type definition.
      If from JSON: create a type from the schema.
      If from a library: check the library's .d.ts or source types.
    auto_inject: true

  - id: tsafe-type-infection
    severity: high
    category: type-safety
    description: "Weak type propagated through multiple function calls, spreading type unsafety"
    symptom: "One any/interface{} at the source disables type checking through entire call chain"
    solution: |
      Fix at the source — type the originating value correctly.
      All downstream consumers inherit the correct type automatically.
      Trace propagation: grep for function/variable name, count hops.
    auto_inject: true

  - id: tsafe-unsafe-assertion
    severity: high
    category: type-safety
    description: "Type assertion (as X, .(X)) without runtime verification"
    symptom: "Runtime panic or silent data corruption if value isn't actually type X"
    solution: |
      Add runtime check before assertion:
      Go: v, ok := x.(Type); if !ok { handle }
      TS: type guard function, instanceof, or discriminant check
      Python: isinstance() check
    auto_inject: true

  - id: tsafe-type-ignore-directive
    severity: medium
    category: type-safety
    description: "@ts-ignore, @ts-expect-error, or # type: ignore suppressing type errors"
    symptom: "Known type error being hidden instead of fixed"
    solution: |
      Read the suppressed error. Fix the underlying type issue.
      If the error is from a broken library type, wrap the library
      call with a properly typed adapter function.
    auto_inject: true

  - id: tsafe-boundary-unknown-correct
    severity: low
    category: judgment
    description: "False positive trap: unknown/any at genuine system boundary is correct defensive typing"
    symptom: "Agent flags correct boundary typing as a weakness"
    solution: |
      DO NOT flag unknown/any at:
      - HTTP request/response handlers
      - JSON.parse() / json.Unmarshal results
      - User input processing, CLI args
      - External API responses, FFI calls
      Instead, verify narrowing happens before the value is consumed.
    auto_inject: true

  - id: tsafe-implicit-any
    severity: high
    category: type-safety
    description: "Missing type annotation causes implicit any, silently infecting all consumers"
    symptom: "Function parameters/returns without annotations propagate any through entire call chain"
    solution: |
      Add explicit type annotations to exported/public functions.
      TS: enable noImplicitAny in tsconfig.json.
      Python: add -> ReturnType and parameter annotations.
      Go: compiler prevents this — not applicable.
    auto_inject: true

  - id: tsafe-empty-interface-param
    severity: medium
    category: type-safety
    description: "Function parameter typed as interface{}/any where concrete type exists"
    symptom: "Callers can pass anything, bypassing type checking at the API boundary"
    solution: |
      Determine what types are actually passed by grepping call sites.
      If 1-3 types: use a union or interface with the shared methods.
      If the function is generic: use Go generics with constraints.
    auto_inject: true

  - id: tsafe-rust-unsafe-cast
    severity: high
    category: type-safety
    description: "Rust unsafe/transmute/as cast where result escapes scope without invariant re-establishment"
    symptom: "Downstream safe code makes assumptions the unsafe block may have violated"
    solution: |
      Wrap unsafe results in a newtype that re-establishes invariants.
      Use From/TryFrom trait implementations for safe conversion.
      If transmute is necessary, add safety comment explaining why
      the transmutation is valid and what invariants are preserved.
    auto_inject: true

  - id: tsafe-r-unchecked-coercion
    severity: medium
    category: type-safety
    description: "R as.* coercion without preceding is.* guard — silent data corruption risk"
    symptom: "as.numeric('abc') returns NA silently, corrupting downstream calculations"
    solution: |
      Add is.numeric/is.character/is.logical guard before coercion.
      Use stopifnot() or checkmate assertions for function arguments.
      For S4 classes, use validObject() after construction.
    auto_inject: true

  - id: tsafe-weak-generic-constraint
    severity: medium
    category: type-safety
    description: "Generic type parameter without meaningful constraint (Go any, Rust unbounded T, TS unconstrained T)"
    symptom: "Generic function accepts anything, defeating the purpose of parameterized types"
    solution: |
      Add constraint that reflects actual usage:
      Go: use interface constraint matching required methods
      Rust: add trait bounds (T: Display + Clone)
      TS: add extends clause (T extends HasId)
    auto_inject: true

  - id: tsafe-boundary-not-narrowed
    severity: high
    category: type-safety
    description: "Value enters at boundary as unknown/any but is consumed without any narrowing"
    symptom: "System boundary correctly types input as unknown, but downstream code uses it raw"
    solution: |
      Add narrowing at the boundary before the value enters internal code:
      TS: type guard, zod/io-ts validation, discriminant check
      Go: type switch or assertion with ok check after unmarshal
      Python: isinstance check or pydantic validation
      R: is.* check or checkmate assertion
    auto_inject: true
