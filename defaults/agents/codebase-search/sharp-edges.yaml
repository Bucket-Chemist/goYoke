edges:
  - name: regex_flavor_mismatch
    severity: medium
    description: >
      Using PCRE (Perl) features in `grep` or `ripgrep` without checking support, 
      or confusing Glob syntax with Regex.
    mitigation: >
      Stick to basic Regex. If complex lookarounds are needed, use Python/scripting. 
      Remember `*` is a quantifier in Regex but a wildcard in Glob.

  - name: flooding_context
    severity: critical
    description: >
      Returning 5000 lines of search results to the context window, 
      which degrades performance and costs money.
    mitigation: >
      Always pipe to `head` or `less` first if unsure. Use `-l` (filenames only) 
      first, then narrow down. Use `limit` parameter in tools.

  - name: infinite_recursion
    severity: medium
    description: >
      Searching inside `.git`, `node_modules`, `venv`, or `__pycache__`.
    mitigation: >
      Ensure the tool automatically ignores these, or explicitly exclude them 
      in Glob/Grep patterns.

  - name: searching_binary_files
    severity: medium
    description: >
      Grepping inside binary files (images, PDFs, compiled code).
    mitigation: >
      Use tools that skip binary files by default (like `ripgrep` or `grep -I`).
