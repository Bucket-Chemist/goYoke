# Sharp Edges for GO API Agent
# Common HTTP client and API integration pitfalls

version: "1.0"
updated: "2026-01-15"

sharp_edges:
  - id: default-http-client
    severity: critical
    category: networking
    description: "Default http.Client has no timeout"
    symptom: "Requests hang indefinitely, goroutine leaks"
    solution: |
      NEVER use:
      http.Get(url)
      http.DefaultClient.Do(req)
      
      ALWAYS configure:
      client := &http.Client{
          Timeout: 120 * time.Second,
          Transport: &http.Transport{...}
      }
    auto_inject: true

  - id: response-body-leak
    severity: high
    category: resource-management
    description: "Response body not closed"
    symptom: "Connection pool exhaustion, memory leaks"
    solution: |
      ALWAYS close response body:
      resp, err := client.Do(req)
      if err != nil { return err }
      defer resp.Body.Close()  // EVEN if you don't read it
      
      Also close on error responses:
      if resp.StatusCode >= 400 {
          resp.Body.Close()  // Don't forget!
          return &APIError{...}
      }
    auto_inject: true

  - id: request-body-retry
    severity: high
    category: retry-logic
    description: "Request body consumed on first attempt"
    symptom: "Retries send empty body"
    solution: |
      Clone body before retry:
      bodyBytes, _ := io.ReadAll(req.Body)
      req.Body.Close()
      
      // For each retry:
      retryReq := req.Clone(ctx)
      retryReq.Body = io.NopCloser(bytes.NewReader(bodyBytes))
    auto_inject: true

  - id: backoff-without-jitter
    severity: medium
    category: retry-logic
    description: "Fixed backoff causes thundering herd"
    symptom: "Multiple clients retry at same time, overload server"
    solution: |
      WRONG: Fixed backoff
      time.Sleep(time.Second * time.Duration(attempt))
      
      CORRECT: Exponential with jitter
      delay := float64(base) * math.Pow(2.0, float64(attempt))
      jitter := delay * (0.5 + rand.Float64())
    auto_inject: true

  - id: context-not-propagated
    severity: high
    category: cancellation
    description: "Context not passed to HTTP request"
    symptom: "Cancellation doesn't stop in-flight requests"
    solution: |
      WRONG: Context ignored
      req, _ := http.NewRequest("GET", url, nil)
      
      CORRECT: Context attached
      req, _ := http.NewRequestWithContext(ctx, "GET", url, nil)
      
      // Or:
      req = req.WithContext(ctx)
    auto_inject: true

  - id: rate-limit-no-wait
    severity: medium
    category: rate-limiting
    description: "Rate limiter Allow() doesn't block"
    symptom: "Requests rejected instead of queued"
    solution: |
      WRONG: Non-blocking check (rejects if over limit)
      if !limiter.Allow() {
          return errors.New("rate limited")
      }
      
      CORRECT: Blocking wait (queues if over limit)
      if err := limiter.Wait(ctx); err != nil {
          return fmt.Errorf("rate limit: %w", err)
      }
    auto_inject: true
