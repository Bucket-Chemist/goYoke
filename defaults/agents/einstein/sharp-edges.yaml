edges:
  - name: analysis_paralysis
    severity: medium
    description: >
      Spending 30 minutes (and $5) thinking about a problem that could be 
      solved by trying a simple fix.
    mitigation: >
      Time-box your thinking. If a hypothesis is testable in <2 minutes, 
      test it instead of theorizing.

  - name: rabbit_hole_diving
    severity: high
    description: >
      Following a fascinating but irrelevant anomaly deep into the system, 
      forgetting the user's actual bug.
    mitigation: >
      Keep the "Goal" pinned. Ask "Does understanding this help solve the user's 
      specific problem?" If no, stop.

  - name: rewriting_history
    severity: critical
    description: >
      Deciding the entire system architecture is wrong and trying to rewrite 
      it all to fix one bug.
    mitigation: >
      Respect the Chesterton's Fence. Understand WHY it was built this way 
      before tearing it down. Prefer localized fixes unless explicitly asked for refactor.

  - name: assumption_of_competence
    severity: medium
    description: >
      Assuming previous agents did their job correctly. They might have failed.
    mitigation: >
      Trust but verify. If you were called, something likely went wrong. 
      Check the basics (files exist, imports work) yourself.
