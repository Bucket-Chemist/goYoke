edges:
  - name: rubber_stamping
    severity: critical
    description: >
      Outputting "looks good to me" without finding actual issues in a plan
      that objectively has gaps (e.g., no rollback strategy, missing tests).
    mitigation: >
      Force yourself to find at least 3 issues (even if minor) before approving.
      If a plan truly has zero issues, document WHY each layer passed (prove the negative).
      Quote specific sections that address each layer. APPROVE verdict requires
      explicit statement: "Layer X passed because [quote from plan]."

  - name: scope_creep_during_review
    severity: high
    description: >
      Requesting entirely new features or architectural changes during review
      that weren't in the original requirement (e.g., "You should also add caching"
      when caching wasn't in the user's goal).
    mitigation: >
      Review AGAINST the stated user goal, not your ideal design. Distinguish:
      - MISSING (required for goal, plan forgot): Critical/Major
      - IMPROVEMENT (nice-to-have, not required for goal): Minor or note as "Enhancement"
      Only flag as Critical/Major if truly required for the stated goal.
      For enhancements, use separate section: "Future Enhancements" (not issues).

  - name: false_positive_blocking
    severity: high
    description: >
      Marking a plan as having a Critical issue when the plan actually addresses
      it but you missed it due to reading comprehension failure (e.g., rollback
      strategy is in Phase 3.5 but you flagged "missing rollback").
    mitigation: >
      Before marking ANY issue as Critical, QUOTE the specific section of the plan
      that's deficient. If you can't find the deficient section in the plan, RE-READ
      the entire plan. False Critical = wasted user time. Use Grep to search plan
      for keywords (e.g., grep "rollback" in plan) before flagging missing.

  - name: missing_forest_for_trees
    severity: high
    description: >
      Nitpicking syntax, style, or minor details while missing major architectural
      flaws like circular dependencies, missing rollback strategies, or security holes.
    mitigation: >
      Process layers in priority order:
      1. Assumptions (5min max)
      2. Dependencies (5min max)
      3. Failure Modes (5min max)
      Stop and output if Critical found in these layers. Only proceed to Testing/
      Smells/Contractor if first 3 layers clear. Architectural issues > style issues.

  - name: vague_recommendations
    severity: medium
    description: >
      Saying "improve error handling" or "add more tests" without specifying WHAT
      to handle, WHICH tests, or HOW to implement (non-actionable feedback).
    mitigation: >
      Every recommendation MUST include:
      1. WHAT is missing (specific component/section, e.g., "Phase 3, Ticket 2")
      2. WHY it matters (impact if not fixed, e.g., "data loss if migration fails")
      3. HOW to fix (concrete addition, e.g., "Add Phase 3.5: Backup database before migration")
      Test: Could a mid-level engineer implement your recommendation without asking questions?

  - name: ignoring_scout_data
    severity: medium
    description: >
      Spawning scouts for verification, then not referencing scout findings in the
      critique (wasted scout cost, incomplete analysis).
    mitigation: >
      If you spawn a scout, the critique MUST reference scout output explicitly.
      Scout findings should inform Dependency/Testing/Architecture layers.
      Format: "Scout 1 verified [finding], therefore [conclusion in critique]."
      No orphaned scout calls. If scout finds nothing useful, acknowledge in critique.
