# Sharp Edges for Rust Pro Agent
# These are common pitfalls and learned gotchas

version: "1.1"
updated: "2026-04-17"

sharp_edges:
  - id: integer-overflow-debug-release
    severity: critical
    category: correctness
    description: "Integer overflow panics in debug but silently wraps in release"
    symptom: "Tests pass, production computes silently wrong results"
    solution: |
      In debug mode, integer overflow panics. In release mode, it wraps
      via two's complement with NO warning.

      WRONG: relying on default behavior
      let total = a + b;  // Panics in debug, wraps in release

      CORRECT: explicit overflow handling
      let total = a.checked_add(b).context("overflow")?;
      let total = a.saturating_add(b);  // Clamps to MAX
      let total = a.wrapping_add(b);    // Explicit wrap

      Also: `as` casts silently truncate:
      0x1234u16 as u8  // yields 0x34 with no warning!
      Use TryFrom instead:
      u8::try_from(value).context("out of range")?;

      Consider: [profile.release] overflow-checks = true
    auto_inject: true

  - id: unwrap-expect-production
    severity: critical
    category: error-handling
    description: "Using .unwrap() or .expect() in production code"
    symptom: "Application panics on unexpected input instead of handling errors"
    solution: |
      .unwrap() and .expect() abort the program on None/Err.
      NEVER use in production code paths.

      WRONG:
      let val = map.get("key").unwrap();
      let data = std::fs::read(path).expect("read failed");

      CORRECT:
      let val = map.get("key").context("missing key")?;
      let data = std::fs::read(path).context("reading file")?;

      OK in tests and one-time setup where panic is acceptable.
      Use #![deny(clippy::unwrap_used, clippy::expect_used)] to enforce.
    auto_inject: true

  - id: blocking-async-runtime
    severity: critical
    category: async
    description: "Blocking operations inside async context starve the runtime"
    symptom: "Other tasks freeze, throughput drops, timeouts occur"
    solution: |
      Tokio tasks share threads. Blocking one blocks all tasks on that thread.
      Task swapping ONLY happens at .await points.

      WRONG:
      async fn bad() {
          let data = std::fs::read_to_string("big.csv").unwrap();
          let result = heavy_computation(&data);  // Starves runtime
      }

      CORRECT:
      async fn good() {
          let data = tokio::task::spawn_blocking(|| {
              std::fs::read_to_string("big.csv")
          }).await??;

          let result = tokio::task::spawn_blocking(move || {
              heavy_computation(&data)
          }).await?;
      }

      Also: calling block_on() inside async context panics or deadlocks.
    auto_inject: true

  - id: lock-across-await
    severity: critical
    category: async
    description: "Holding MutexGuard or RAII guard across .await point"
    symptom: "Deadlocks, future is not Send, tasks blocked indefinitely"
    solution: |
      RAII guards (MutexGuard, RwLockGuard, DashMap refs) held across
      .await can cause deadlocks. std::sync::Mutex guards make the
      future !Send, preventing use with tokio::spawn.

      WRONG:
      let guard = mutex.lock().await;
      do_network_call().await;  // guard still held!
      drop(guard);

      CORRECT: scope the guard
      let value = {
          let guard = mutex.lock().await;
          guard.clone()
      };  // guard dropped here
      do_network_call().await;

      Clippy lint: await_holding_lock catches std::sync but NOT all types.
    auto_inject: true

  - id: let-underscore-drops-immediately
    severity: high
    category: ownership
    description: "`let _ = expr` drops immediately; `let _guard = expr` does not"
    symptom: "Lock released immediately, RAII guard has no effect"
    solution: |
      `let _ = x` is a pattern that IMMEDIATELY drops the value.
      `let _name = x` binds to a named variable that lives until scope end.

      WRONG: lock released immediately
      let _ = mutex.lock().unwrap();  // Unlocked on this line!
      critical_section();             // NOT protected

      CORRECT: lock held until scope end
      let _guard = mutex.lock().unwrap();
      critical_section();  // Protected
      // _guard dropped here at scope end

      Same applies to:
      - tempfile::TempDir (deleted immediately with let _)
      - tracing::Span (entered then exited immediately)
      - Any RAII type
    auto_inject: true

  - id: string-indexing-panic
    severity: high
    category: strings
    description: "String byte-range indexing panics on non-character boundaries"
    symptom: "Runtime panic on non-ASCII input"
    solution: |
      Rust strings are UTF-8. You cannot index by integer (compile error),
      but range slicing panics if the range falls inside a multi-byte char.

      PANIC:
      let s = "🦀 hello";
      let c = &s[0..1];  // Panics! byte 1 is inside the 4-byte crab emoji

      Also: .len() returns BYTES, not characters:
      "café".len()           == 5  (é is 2 bytes)
      "café".chars().count() == 4  (4 Unicode scalar values)

      CORRECT: iterate safely
      for ch in s.chars() { ... }
      if let Some(first) = s.chars().next() { ... }

      For byte-safe slicing:
      s.get(0..4).unwrap_or_default()
    auto_inject: true

  - id: async-cancellation-safety
    severity: high
    category: async
    description: "Code after .await is not guaranteed to execute if task is cancelled"
    symptom: "Cleanup code never runs, state left inconsistent"
    solution: |
      Tasks can be cancelled at any .await point (e.g., tokio::select!,
      timeout, task abort). Code after the .await may never execute.

      WRONG: cleanup after .await
      async fn bad() {
          resource.acquire().await;
          do_work().await;
          resource.release().await;  // May NEVER run if cancelled!
      }

      CORRECT: use Drop guards
      async fn good() {
          let _guard = scopeguard::guard((), |_| resource.release());
          resource.acquire().await;
          do_work().await;
          // _guard runs release on drop, even on cancellation
      }

      In select! loops, hoist futures above the loop with fuse() + pin!()
      to avoid recreating non-cancellation-safe futures each iteration.
    auto_inject: true

  - id: serde-flatten-deny-unknown
    severity: high
    category: serialization
    description: "#[serde(flatten)] is incompatible with deny_unknown_fields"
    symptom: "Deserialization silently fails or rejects valid input at runtime"
    solution: |
      Combining #[serde(flatten)] with #[serde(deny_unknown_fields)]
      does NOT produce a compile error but BREAKS at runtime.

      BROKEN (no compile error, runtime failure):
      #[derive(Deserialize)]
      #[serde(deny_unknown_fields)]
      struct Config {
          name: String,
          #[serde(flatten)]
          extra: HashMap<String, Value>,  // INCOMPATIBLE!
      }

      Also: #[serde(skip)] + deny_unknown_fields rejects the skipped
      field as "unknown" during deserialization.

      Choose one: flatten OR deny_unknown_fields, not both.
    auto_inject: true

  - id: drop-order-struct-vs-locals
    severity: medium
    category: ownership
    description: "Drop order differs between locals, struct fields, and tuples"
    symptom: "Resources released in unexpected order, use-after-free in unsafe"
    solution: |
      Drop order in Rust is NOT uniform:
      - Local variables: REVERSE declaration order (last declared drops first)
      - Struct fields: FORWARD declaration order (first field drops first)
      - Tuple elements: FORWARD order
      - Function arguments: REVERSE order (implementation-defined)

      This matters when one resource depends on another:

      WRONG: db drops before logger (reverse order)
      let logger = Logger::new("app.log");
      let db = Database::new(&logger);  // borrows logger
      // db dropped first (reverse), then logger - OK here but fragile

      If using unsafe or FFI, declare resources in dependency order
      and verify drop behavior with explicit Drop impls.

      Edition 2024 change: temporaries in if-let conditions now drop
      before the else branch, fixing the classic RwLock deadlock:
      if let Ok(val) = rwlock.read() { ... }
      else { rwlock.write().unwrap(); }  // No longer deadlocks in 2024
    auto_inject: true

  - id: mutex-poisoning
    severity: medium
    category: concurrency
    description: "Mutex::lock returns Err if a thread panicked while holding it"
    symptom: "PoisonError propagates panics across threads via .unwrap()"
    solution: |
      When a thread panics while holding a std::sync::Mutex lock,
      the mutex becomes "poisoned." Subsequent lock() calls return
      Err(PoisonError).

      WRONG: panic propagation
      let guard = mutex.lock().unwrap();  // Panics if poisoned

      CORRECT: recover from poisoning
      let guard = mutex.lock().unwrap_or_else(|e| e.into_inner());

      Alternative: use parking_lot::Mutex which does NOT poison.
      Or use tokio::sync::Mutex in async contexts (also no poisoning).
    auto_inject: true

  - id: path-join-absolute
    severity: medium
    category: filesystem
    description: "Path::join with absolute second argument replaces the first path"
    symptom: "Constructed path ignores the base directory entirely"
    solution: |
      Path::join replaces the entire path if the argument is absolute.

      SURPRISE:
      Path::new("/usr").join("/local/bin")
      // yields: /local/bin  (NOT /usr/local/bin)

      This is a security risk with user-provided paths!

      CORRECT: strip leading slash or validate
      let user_path = user_input.strip_prefix('/').unwrap_or(user_input);
      let safe = base.join(user_path);

      Or validate:
      let full = base.join(user_input);
      assert!(full.starts_with(&base), "path traversal attempt");
    auto_inject: true

  - id: derive-default-invalid-state
    severity: medium
    category: semantics
    description: "#[derive(Default)] on config structs creates invalid zero-states"
    symptom: "Port 0, empty host, max_connections 0, silent misconfiguration"
    solution: |
      #[derive(Default)] sets all fields to their type's default:
      String -> "", u16 -> 0, bool -> false, usize -> 0

      WRONG:
      #[derive(Default)]
      struct ServerConfig {
          host: String,      // ""
          port: u16,         // 0
          max_conn: usize,   // 0
      }

      CORRECT: use a builder with sensible defaults
      impl ServerConfig {
          pub fn builder() -> ServerConfigBuilder { ... }
      }

      Or implement Default manually:
      impl Default for ServerConfig {
          fn default() -> Self {
              Self {
                  host: "127.0.0.1".into(),
                  port: 8080,
                  max_conn: 1024,
              }
          }
      }
    auto_inject: true

  - id: tokio-test-single-threaded
    severity: medium
    category: testing
    description: "#[tokio::test] uses single-threaded runtime by default"
    symptom: "Tests pass but production (multi-thread) reveals race conditions"
    solution: |
      #[tokio::test] defaults to current_thread (single-threaded) runtime.
      #[tokio::main] defaults to multi_thread runtime.

      This means concurrency bugs may not surface in tests.

      SINGLE-THREADED (default):
      #[tokio::test]
      async fn test() { ... }

      MULTI-THREADED (matches production):
      #[tokio::test(flavor = "multi_thread", worker_threads = 2)]
      async fn test_concurrent() { ... }

      Use multi_thread flavor for integration tests and
      any test exercising shared state or channel communication.
    auto_inject: true

  - id: rc-reference-cycles
    severity: medium
    category: memory
    description: "Rc<RefCell<T>> cycles cause memory leaks that are memory-safe"
    symptom: "Memory usage grows unbounded, objects never deallocated"
    solution: |
      Rust prevents data races but NOT memory leaks.
      Rc<T> reference cycles are perfectly safe but leak memory forever.

      LEAK:
      struct Node {
          next: Option<Rc<RefCell<Node>>>,  // Can form cycles
      }

      CORRECT: use Weak<T> for back-references
      struct Node {
          children: Vec<Rc<RefCell<Node>>>,
          parent: Option<Weak<RefCell<Node>>>,  // Breaks cycle
      }

      In async: same applies to Arc<T>. Use Arc::downgrade() for Weak<T>.
    auto_inject: true

  - id: refcell-runtime-panic
    severity: medium
    category: ownership
    description: "RefCell enforces borrow rules at runtime—panics on violation"
    symptom: "BorrowMutError panic when two mutable borrows overlap"
    solution: |
      RefCell<T> moves borrow checking from compile time to runtime.
      Violating the rules (double mutable borrow) PANICS at runtime.

      PANIC:
      let cell = RefCell::new(vec![1, 2, 3]);
      let mut a = cell.borrow_mut();
      let mut b = cell.borrow_mut();  // PANIC: already mutably borrowed

      CORRECT: use try_borrow_mut
      match cell.try_borrow_mut() {
          Ok(mut guard) => { ... }
          Err(_) => { /* handle conflict */ }
      }

      Prefer restructuring to avoid RefCell entirely—the borrow checker
      is your friend, not your enemy.
    auto_inject: true

  - id: as-cast-sign-loss
    severity: medium
    category: correctness
    description: "`as` casts silently lose sign and truncate without warning"
    symptom: "Negative values become large positive values, data corruption"
    solution: |
      `as` performs silent truncation and sign reinterpretation:
      -1i32 as u32       == 4294967295  (wraps)
      256u16 as u8       == 0           (truncates)
      f64::NAN as u64    == 0           (saturates since 1.45)

      WRONG:
      let port = config.port as u16;  // Silent truncation if > 65535

      CORRECT:
      let port = u16::try_from(config.port)
          .context("port out of range")?;

      Enable clippy lints:
      #![warn(clippy::cast_possible_truncation)]
      #![warn(clippy::cast_sign_loss)]
      #![warn(clippy::cast_possible_wrap)]
    auto_inject: true

  - id: edition-2024-rpit-captures
    severity: low
    category: edition-migration
    description: "Edition 2024 RPIT captures all lifetimes—may break existing code"
    symptom: "Lifetime errors after migrating to edition 2024"
    solution: |
      In edition 2024, impl Trait return types capture ALL in-scope
      lifetime parameters. Code relying on lifetimes NOT being captured
      will fail.

      Pre-2024 (worked because 'b was not captured):
      fn foo<'a, 'b>(x: &'a str, _y: &'b str) -> impl Display + 'a {
          x
      }

      Edition 2024 (now captures 'b too—may cause errors):
      // Fix: explicitly limit captures
      fn foo<'a, 'b>(x: &'a str, _y: &'b str) -> impl Display + use<'a> {
          x
      }

      The + '_ annotation is now unnecessary and should be removed.
      Run `cargo fix --edition` to auto-migrate most cases.
    auto_inject: false

  - id: edition-2024-unsafe-attributes
    severity: low
    category: edition-migration
    description: "Edition 2024 requires unsafe() wrapper on certain attributes"
    symptom: "Compiler errors on #[no_mangle], #[link_section] after migration"
    solution: |
      Edition 2024 treats certain attributes as unsafe operations:

      Pre-2024:
      #[no_mangle]
      pub extern "C" fn my_function() { ... }

      Edition 2024:
      #[unsafe(no_mangle)]
      pub extern "C" fn my_function() { ... }

      Also: std::env::set_var() is now unsafe.
      Affected attributes: no_mangle, link_section, export_name.
    auto_inject: false

  - id: tracing-vs-log
    severity: low
    category: logging
    description: "Use tracing crate instead of log for structured, async-aware logging"
    symptom: "Lost context in async code, unstructured log output"
    solution: |
      The tracing crate provides structured, async-aware logging with
      span support. Prefer over the log crate for new projects.

      use tracing::{info, instrument};

      #[instrument(skip(config))]
      async fn handle_request(req: Request, config: &Config) -> Result<Response> {
          info!(method = %req.method(), path = %req.uri(), "handling request");
          // Span context automatically propagated through async calls
          let result = process(req).await?;
          info!(status = %result.status(), "request complete");
          Ok(result)
      }

      Setup:
      tracing_subscriber::fmt()
          .with_env_filter(EnvFilter::from_default_env())
          .json()  // Structured JSON output
          .init();
    auto_inject: false

  - id: musl-allocator-performance
    severity: low
    category: performance
    description: "musl's default allocator is significantly slower for multi-threaded workloads"
    symptom: "Binary compiled with musl target is 2-10x slower than glibc"
    solution: |
      musl libc provides fully static binaries but its malloc is
      optimized for size, not speed. Multi-threaded allocation-heavy
      workloads suffer severely.

      Fix: swap in a faster allocator:

      // Cargo.toml
      [dependencies]
      mimalloc = { version = "0.1", default-features = false }

      // main.rs
      #[global_allocator]
      static GLOBAL: mimalloc::MiMalloc = mimalloc::MiMalloc;

      Alternatives: jemalloc (jemallocator crate), snmalloc.
      Test with and without to measure the difference.
    auto_inject: false

  - id: missing-pedantic-clippy-lints
    severity: medium
    category: code-quality
    description: "Generated code missing crate-level pedantic clippy lint attributes"
    symptom: "cargo clippy -- -D warnings passes but pedantic lints like needless_continue, ignored_unit_patterns, redundant_closure_for_method_calls are not caught"
    solution: |
      Every lib.rs and main.rs MUST include these crate-level lint attributes:

      #![warn(clippy::all, clippy::pedantic)]
      #![allow(clippy::module_name_repetitions)]  // Common false positive
      #![deny(clippy::unwrap_used, clippy::expect_used)]
      #![deny(unsafe_code)]  // Remove only where justified

      Without these, cargo clippy -- -D warnings only checks the default
      lint set, missing many pedantic improvements.

      After writing code, always run:
      cargo clippy --all-targets -- -D warnings

      Fix all warnings before returning output to the user.
    auto_inject: true

  - id: unnecessary-async-state-machine
    severity: high
    category: async-optimization
    description: "async fn with no .await generates unnecessary state machine overhead"
    symptom: "Inflated binary size and future size for functions that never yield"
    solution: |
      Functions marked async that contain no .await still generate a full
      state machine. This adds dead weight to binary size and future size.

      Clippy PR #16244 (rust-clippy) will lint this, but is not yet stable.

      WRONG: pointless async state machine
      async fn load_default() -> Config {
          Config::new()  // No .await — generates state machine for nothing
      }

      CORRECT: return a ready future (zero-cost)
      fn load_default() -> impl Future<Output = Config> {
          std::future::ready(Config::new())
      }

      This is especially impactful for trait implementations where many
      methods may have synchronous default implementations.

      Edition 2024 note: Future is in the prelude, so no import needed.
    auto_inject: true

  - id: owned-values-inflate-future-size
    severity: high
    category: async-optimization
    description: "Passing owned large values to async fn duplicates them in the state machine"
    symptom: "Unexpectedly large future sizes, high stack usage, poor optimizer output"
    solution: |
      Owned values passed to async functions are stored TWICE: once as the
      parameter and once inside the generated state machine. This compounds
      with buffer sizes.

      Measured on Rust 1.94, x86_64:
      async fn big(mut buffer: [u8; 1024]) { ... }   // Future = 2080 bytes
      async fn small(buffer: &mut [u8; 1024]) { ... } // Future = 40 bytes

      That is a 52x difference (98% reduction) from one signature change.

      WRONG: owned buffer in async fn
      async fn process(data: Vec<u8>) -> Result<()> {
          // Vec is 24 bytes (ptr+len+cap) but the principle applies
          // to any large value type: arrays, structs with buffers
          do_io(&data).await
      }

      CORRECT: pass by reference
      async fn process(data: &[u8]) -> Result<()> {
          do_io(data).await
      }

      Rule of thumb: if a type is larger than a pointer (8 bytes on x86_64),
      pass it by reference into async functions.
    auto_inject: true

  - id: async-passthrough-wrapper
    severity: medium
    category: async-optimization
    description: "Trait impl that just .awaits inner future creates unnecessary wrapper state machine"
    symptom: "Extra state machine layer per delegation, inflated binary size"
    solution: |
      Trait implementations that simply forward to an inner method and
      .await the result generate a redundant wrapper state machine.

      WRONG: wrapper state machine
      impl Service for MyWrapper {
          async fn call(&self, req: Request) -> Result<Response> {
              self.inner.call(req).await  // Extra state machine just to forward
          }
      }

      CORRECT: return the inner future directly
      impl Service for MyWrapper {
          fn call(&self, req: Request) -> impl Future<Output = Result<Response>> {
              self.inner.call(req)  // Zero-cost: no wrapper state machine
          }
      }

      For functions with postamble logic, use futures::FutureExt::map():
      use futures::FutureExt;

      fn call(&self, req: Request) -> impl Future<Output = Result<Response>> {
          self.inner.call(req).map(|res| res.map(|r| r.with_header("x-via", "wrapper")))
      }

      Caveat: preamble code (before the future) now executes eagerly on
      call, not lazily on first poll. This is usually fine but changes
      behavior if callers construct futures without polling them.
    auto_inject: true
