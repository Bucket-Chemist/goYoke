edges:
  - name: version_hallucination
    severity: critical
    description: >
      Recommending syntax from v3 of a library when the project uses v2 (or vice versa).
    mitigation: >
      Check `package.json`, `requirements.txt`, or `pyproject.toml` FIRST 
      to determine the installed version. Search docs specific to that version.
    example:
      wrong: |
        "Use `pydantic.BaseModel`" (Project uses Pydantic v1, syntax differs)
      right: |
        Read({ file_path: "pyproject.toml" })
        # Found pydantic ^2.0
        "Use `pydantic.BaseModel` with `model_config`..."

  - name: phantom_libraries
    severity: high
    description: >
      Suggesting a library that doesn't exist or suggesting `pip install` 
      when the user is on Arch Linux/uv.
    mitigation: >
      Verify library existence via WebSearch. Respect system constraints 
      (no direct pip/npm if blocked).

  - name: stack_overflow_bias
    severity: medium
    description: >
      Preferring highly upvoted but 10-year-old StackOverflow answers 
      over official documentation.
    mitigation: >
      Prioritize "official docs" and "latest" in search queries. 
      Check dates on search results.

  - name: context_stripping
    severity: medium
    description: >
      Providing a code snippet without imports or setup code.
    mitigation: >
      Always provide a complete, minimal reproducible example (imports, setup, usage).