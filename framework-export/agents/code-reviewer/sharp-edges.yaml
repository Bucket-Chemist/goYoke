edges:
  - name: style_nitpicking
    severity: medium
    description: >
      Flagging valid code because it doesn't match YOUR personal preference, 
      ignoring the project's existing style (e.g., complaining about quotes).
    mitigation: >
      Check neighboring code. If the file uses single quotes, don't flag them 
      to change to double quotes. Only flag logical errors or security risks strictly.

  - name: unused_import_false_positive
    severity: high
    description: >
      Flagging an import as unused when it's re-exported (e.g., in `__init__.py`) 
      or used in type checking quotes.
    mitigation: >
      Check for `__all__` or usage in strings/type comments before flagging.

  - name: missing_logic_bugs
    severity: high
    description: >
      Focusing so much on syntax/style that you miss an off-by-one error 
      or a missing null check.
    mitigation: >
      Explicitly "think" about control flow and edge cases (empty list, None input) 
      before looking at style.

  - name: security_blindness
    severity: critical
    description: >
      Missing obvious SQL injection or hardcoded secrets because you're looking at variable naming.
    mitigation: >
      Run a dedicated "security pass" in your thinking process. 
      Scan for `exec`, `eval`, SQL strings, and "password"/"key" variables.
