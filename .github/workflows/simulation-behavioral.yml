# Behavioral Simulation CI/CD Pipeline
# 4-level testing: Unit → Session Replay → Behavioral Properties → Chaos
#
# Design rationale:
# - Levels 1-2 run on every push for fast feedback (<5 min)
# - Level 3 runs on PRs for thorough validation
# - Level 4 runs weekly for deep chaos testing (catches race conditions)
#
# See: dev/will/migration_plan/tickets/042.md for full specification

name: Behavioral Simulation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly Sunday 4am UTC - deep chaos testing
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      chaos_agents:
        description: 'Number of agents for chaos testing'
        default: '10'
        type: string
      chaos_shared_ratio:
        description: 'Ratio of agents sharing keys (0.0-1.0)'
        default: '0.3'
        type: string

env:
  GO_VERSION: '1.25'

jobs:
  # ===========================================================================
  # Level 1: Unit Invariants (fast, every push)
  # Tests individual hook behaviors in isolation
  # ===========================================================================
  unit-invariants:
    name: L1 Unit Invariants
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build CLIs
        run: make build-validate build-archive build-sharp-edge

      - name: Run Deterministic Tests
        run: make test-simulation-deterministic

      - name: Run Unit Tests with Race Detector
        run: go test -v -race ./test/simulation/harness/...

  # ===========================================================================
  # Level 2: Session Replay (fast, every push)
  # Tests multi-turn session sequences
  # ===========================================================================
  session-replay:
    name: L2 Session Replay
    runs-on: ubuntu-latest
    needs: unit-invariants
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build CLIs
        run: make build-validate build-archive build-sharp-edge

      - name: Run Session Replay Tests
        run: make test-simulation-replay

      - name: Upload Replay Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: replay-reports-${{ github.run_number }}
          path: test/simulation/reports/replay-*.json
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Level 3: Behavioral Properties (thorough, PRs only)
  # Tests system invariants across sessions
  # ===========================================================================
  behavioral-properties:
    name: L3 Behavioral Properties
    runs-on: ubuntu-latest
    needs: session-replay
    # Run on PRs and manual triggers, skip on push to master
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build CLIs
        run: make build-validate build-archive build-sharp-edge

      - name: Run Behavioral Tests
        run: make test-simulation-behavioral

      - name: Upload Behavioral Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: behavioral-reports-${{ github.run_number }}
          path: test/simulation/reports/behavioral-*.json
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # Level 4: Chaos Testing (weekly or manual)
  # Tests concurrent agent scenarios with shared-key contention
  # ===========================================================================
  chaos-testing:
    name: L4 Chaos Testing
    runs-on: ubuntu-latest
    # Only on schedule (weekly) or manual trigger
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build CLIs
        run: make build-validate build-archive build-sharp-edge

      - name: Run Chaos Tests
        env:
          CHAOS_AGENTS: ${{ github.event.inputs.chaos_agents || '10' }}
          CHAOS_SHARED_RATIO: ${{ github.event.inputs.chaos_shared_ratio || '0.3' }}
        run: make test-simulation-chaos

      - name: Upload Chaos Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-reports-${{ github.run_number }}
          path: test/simulation/reports/chaos-*.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # Aggregate Status Check
  # Required jobs gate merge to master
  # ===========================================================================
  simulation-status:
    name: Simulation Status
    runs-on: ubuntu-latest
    needs: [unit-invariants, session-replay]
    if: always()

    steps:
      - name: Check Required Jobs
        run: |
          echo "Checking required job results..."

          if [ "${{ needs.unit-invariants.result }}" != "success" ]; then
            echo "::error::Unit invariants failed"
            exit 1
          fi
          echo "✅ Unit invariants: passed"

          if [ "${{ needs.session-replay.result }}" != "success" ]; then
            echo "::error::Session replay failed"
            exit 1
          fi
          echo "✅ Session replay: passed"

          echo ""
          echo "All required simulation tests passed!"
