name: Publish to Public Repo

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate defaults
        run: make defaults

      - name: Run smoke test
        run: make test-defaults

      - name: Run zero-install test
        run: scripts/test-zero-install.sh --skip-claude

      - name: Build check
        run: go build ./...

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: private/go.mod

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate defaults
        working-directory: private
        run: make defaults

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PUBLIC_REPO }}
          ssh-key: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
          path: public

      - name: Sync to public repo
        run: |
          # Clear public repo (except .git)
          find public -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +

          # Sync source (exclude private/runtime/domain-specific content)
          rsync -a \
            --exclude='.goyoke/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='tickets/' \
            --exclude='.git/' \
            --exclude='bin/' \
            --exclude='scripts/claude-edit.sh' \
            --exclude='scripts/empirical-settings-test.sh' \
            --exclude='scripts/test-naked.sh' \
            --exclude='.claude/agents/genomics-reviewer/' \
            --exclude='.claude/agents/proteomics-reviewer/' \
            --exclude='.claude/agents/proteogenomics-reviewer/' \
            --exclude='.claude/agents/proteoform-reviewer/' \
            --exclude='.claude/agents/mass-spec-reviewer/' \
            --exclude='.claude/agents/bioinformatician-reviewer/' \
            --exclude='.claude/agents/pasteur/' \
            --exclude='.claude/agents/staff-bioinformatician/' \
            --exclude='.claude/agents/teams/bioinformatics/' \
            --exclude='.claude/agents/python-architect/' \
            --exclude='.claude/agents/llm-inference-architect/' \
            --exclude='.claude/conventions/python-datasci.md' \
            --exclude='.claude/conventions/python-ml.md' \
            --exclude='.claude/schemas/stdin/bioinformatics-*' \
            --exclude='.claude/schemas/stdin/review-bioinformatics-*' \
            --exclude='.claude/schemas/teams/review-bioinformatics.json' \
            --exclude='.claude/schemas/teams/stdin-stdout/review-bioinformatics-*' \
            --exclude='.claude/skills/review-bioinformatics/' \
            --exclude='docs/teams/bioinformatics/' \
            --exclude='internal/subcmd/utils/teampreparesynth/bioinformatics.go' \
            private/ public/

      - name: Strip private agents from config files
        working-directory: public
        run: |
          PAT="genomics-reviewer|proteomics-reviewer|proteogenomics-reviewer|proteoform-reviewer|mass-spec-reviewer|bioinformatician-reviewer|pasteur|staff-bioinformatician|python-architect|llm-inference-architect"

          # Recursive filter: removes private agent IDs from all arrays and
          # object keys/values throughout the JSON, then deletes the
          # bioinformatics_review tool profile entirely.
          JQ_FILTER='walk(
            if type == "array" then
              map(if type == "string" and test($pat) then empty else . end)
            elif type == "object" then
              with_entries(
                select(
                  (.key | test($pat) | not) and
                  (if (.value | type) == "string" then (.value | test($pat) | not) else true end)
                )
              )
            else .
            end
          ) | del(.tool_profiles.bioinformatics_review // empty)'

          # Filter agents-index.json
          for f in .claude/agents/agents-index.json defaults/agents/agents-index.json; do
            if [ -f "$f" ]; then
              jq --arg pat "$PAT" '.agents |= map(select(.id | test($pat) | not))' "$f" > tmp.json && mv tmp.json "$f"
              echo "Filtered agents-index: $f"
            fi
          done

          # Filter routing-schema.json
          for f in .claude/routing-schema.json defaults/routing-schema.json; do
            if [ -f "$f" ]; then
              jq --arg pat "$PAT" "$JQ_FILTER" "$f" > tmp.json && mv tmp.json "$f"
              echo "Filtered routing-schema: $f"
            fi
          done

          # Verify no private agents leaked
          LEAKED=$(grep -rliE "$PAT" .claude/agents/agents-index.json .claude/routing-schema.json defaults/agents/agents-index.json defaults/routing-schema.json 2>/dev/null || true)
          if [ -n "$LEAKED" ]; then
            echo "ERROR: Private agents still present in: $LEAKED"
            exit 1
          fi
          echo "Verification passed: zero private agent references in public config"

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        working-directory: public
        run: |
          git config user.name "goYoke CI"
          git config user.email "ci@goyoke.dev"
          git add -A
          git add -f defaults/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Release ${{ steps.tag.outputs.TAG }}"
          git tag "${{ steps.tag.outputs.TAG }}"
          git push origin main
          git push origin "${{ steps.tag.outputs.TAG }}"
